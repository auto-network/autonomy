# Project registry — defines containerized project environments for the
# dispatcher and session launcher.
#
# Every entry is a containerized project. Host sessions are a separate,
# pre-existing concept and are NOT part of this config.
#
# Design refs:
#   graph://e9448254-18f  Pluggable project-specific container sessions
#   graph://9df4dd6d-b34  Hard project + soft tags scoping model
#
# Per-project fields:
#   name              Display name (UI label).
#   description       Short description for UI.
#   image             Docker image name (required), e.g. autonomy-agent:dashboard.
#   repos             List of git repos. Each entry:
#                       url       Git remote URL. Autonomy clones into a managed
#                                 location (data/repos/) — NOT a host path.
#                       mount     Path inside the container.
#                       writable  true -> a worktree is created and mounted;
#                                 false -> the managed clone is mounted read-only.
#   working_dir       Container CWD (usually one of the repo mounts).
#   claude_md         Project-specific CLAUDE.md path (relative to repo root).
#   startup           Per-project startup script path (relative to repo root).
#   dind              true -> run with --privileged for Docker-in-Docker.
#   graph_project     Hard graph boundary — passed as GRAPH_SCOPE env var.
#                     Required.
#   default_tags      Soft graph scoping tags — passed as GRAPH_TAGS env var.
#                     Auto-applied to notes; influences search ranking.
#   dispatch_labels   Bead labels that route to this project's image.
#   env               Extra environment variables passed into the container.
#   artifacts         Files the project expects inside the container. Each entry:
#                       name         File name (also the path under
#                                    /etc/autonomy/artifacts/ inside the container).
#                       scope        Layering scope — one of:
#                                      personal-org       data/artifacts/personal/{org}/
#                                      shared-org         data/artifacts/shared/{org}/
#                                      personal-workspace data/artifacts/personal/{org}/{workspace}/
#                                      shared-workspace   data/artifacts/shared/{org}/{workspace}/
#                                    where {org} = graph_project, {workspace} = project id.
#                       required     true -> launch fails if file is missing.
#                       description  Human-readable label (shown in launch errors).
#                       help         Instructions for obtaining the file.

projects:

  autonomy:
    name: "Autonomy Network"
    description: "Core platform — graph, dashboard, dispatcher"
    image: "autonomy-agent:dashboard"
    working_dir: "/workspace/repo"
    claude_md: "agents/shared/terminal/CLAUDE.md"
    graph_project: autonomy
    default_tags: []
    dind: false

  enterprise:
    name: "Enterprise"
    description: "Anchore Enterprise — full stack dev with DinD"
    image: "autonomy-agent:enterprise"
    repos:
      - url: "git@github.com:anchore/enterprise.git"
        mount: "/workspace/enterprise"
        writable: true
      - url: "git@github.com:anchore/enterprise_ng.git"
        mount: "/workspace/enterprise_ng"
        writable: true
    working_dir: "/workspace/enterprise"
    claude_md: "agents/projects/enterprise/CLAUDE.md"
    startup: "agents/projects/enterprise/startup.sh"
    dind: true
    graph_project: anchore
    default_tags: [enterprise]
    dispatch_labels: [enterprise]

  enterprise-ng:
    name: "Enterprise NG"
    description: "Anchore Enterprise NG — component_catalog development"
    image: "autonomy-agent:enterprise-ng"
    repos:
      - url: "git@github.com:anchore/enterprise.git"
        mount: "/workspace/enterprise"
        writable: false
      - url: "git@github.com:anchore/enterprise_ng.git"
        mount: "/workspace/enterprise_ng"
        writable: true
    working_dir: "/workspace/enterprise_ng"
    claude_md: "agents/projects/enterprise-ng/CLAUDE.md"
    startup: "agents/projects/enterprise-ng/startup.sh"
    dind: true
    graph_project: anchore
    default_tags: [enterprise, enterprise-ng]
    dispatch_labels: [enterprise-ng]
    env:
      ANCHORE_CONFIG_PATH: /workspace/enterprise_ng/config/default_config.yaml
    artifacts:
      - name: license.yaml
        scope: personal-org
        required: true
        description: Anchore Enterprise license
        help: "Generate at https://license.anchore.io — save to data/artifacts/personal/anchore/license.yaml"
