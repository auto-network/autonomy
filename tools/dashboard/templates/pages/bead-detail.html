<div x-data="beadDetailPage()">

  <!-- Loading state -->
  <template x-if="state === 'loading'">
    <div class="text-gray-500 text-sm">Loading bead...</div>
  </template>

  <!-- Error state -->
  <template x-if="state === 'error'">
    <div class="text-red-400" x-text="errorMsg"></div>
  </template>

  <!-- Not found state -->
  <template x-if="state === 'notFound'">
    <div class="text-gray-400">Bead not found</div>
  </template>

  <!-- Main content -->
  <template x-if="state === 'ready'">
    <div>

      <!-- Header -->
      <section aria-label="Bead Header" class="mb-6">
        <h1 class="text-2xl font-bold mb-2" x-text="bead.title"></h1>
        <div class="flex gap-2 items-center mb-4 flex-wrap">
          <span class="font-mono text-sm text-gray-500" x-text="bead.id"></span>
          <span class="ft-badge" :class="'badge-p' + bead.priority" x-text="'P' + bead.priority"></span>
          <span class="badge" :class="'badge-' + bead.status" x-text="bead.status"></span>
          <span class="text-sm text-gray-400" x-text="bead.issue_type || ''"></span>
          <template x-if="!isApproved && bead.status !== 'closed'">
            <button @click="approve()"
                    :disabled="approving"
                    class="px-3 py-1 bg-green-700 hover:bg-green-600 text-white text-sm rounded disabled:opacity-50"
                    x-text="approving ? '...' : 'Approve for Dispatch'"></button>
          </template>
          <template x-if="isApproved">
            <span class="px-3 py-1 bg-green-900 text-green-300 text-sm rounded">Approved</span>
          </template>
        </div>
        <!-- Labels -->
        <template x-if="bead.labels && bead.labels.length > 0">
          <div class="flex gap-1 mb-2 flex-wrap">
            <template x-for="label in bead.labels" :key="label">
              <span class="px-2 py-0.5 bg-gray-700 text-gray-300 text-xs rounded" x-text="label"></span>
            </template>
          </div>
        </template>
        <!-- Creator -->
        <template x-if="bead.created_by">
          <div class="text-sm text-gray-400 mb-2">
            Creator: <span x-text="creatorIcon(bead.created_by) + ' ' + creatorLabel(bead.created_by)"></span>
          </div>
        </template>
      </section>

      <!-- Dependencies -->
      <template x-if="depBlockers.length > 0 || depDependents.length > 0">
        <section aria-label="Dependencies" class="mb-6">
          <h2 class="text-lg font-semibold text-gray-200 mb-3 border-b border-gray-700 pb-1">Dependencies</h2>

          <!-- Blockers (things this bead waits on) -->
          <template x-if="depBlockers.length > 0">
            <div class="mb-3">
              <div class="text-xs text-gray-500 uppercase tracking-wide mb-2">Blocked by</div>
              <template x-for="dep in depBlockers" :key="dep.id">
                <a :href="'/bead/' + dep.id"
                   class="flex items-center gap-2 p-2 bg-gray-800 rounded border border-gray-700 hover:border-gray-500 no-underline mb-1">
                  <span class="w-2 h-2 rounded-full flex-shrink-0"
                        :class="dep.status === 'closed' ? 'bg-green-500' : 'bg-amber-500'"></span>
                  <span class="badge" :class="'badge-' + dep.status" x-text="dep.status"></span>
                  <span class="font-mono text-xs text-gray-500" x-text="dep.id"></span>
                  <span class="text-sm text-gray-200 flex-1 truncate" x-text="dep.title"></span>
                </a>
              </template>
            </div>
          </template>

          <!-- Dependents (things that wait on this bead) -->
          <template x-if="depDependents.length > 0">
            <div>
              <div class="text-xs text-gray-500 uppercase tracking-wide mb-2">Blocks</div>
              <template x-for="dep in depDependents" :key="dep.id">
                <a :href="'/bead/' + dep.id"
                   class="flex items-center gap-2 p-2 bg-gray-800 rounded border border-gray-700 hover:border-gray-500 no-underline mb-1">
                  <span class="w-2 h-2 rounded-full flex-shrink-0"
                        :class="dep.status === 'closed' ? 'bg-green-500' : 'bg-amber-500'"></span>
                  <span class="badge" :class="'badge-' + dep.status" x-text="dep.status"></span>
                  <span class="font-mono text-xs text-gray-500" x-text="dep.id"></span>
                  <span class="text-sm text-gray-200 flex-1 truncate" x-text="dep.title"></span>
                </a>
              </template>
            </div>
          </template>
        </section>
      </template>

      <!-- Description -->
      <template x-if="bead.description">
        <section aria-label="Description" class="mb-6">
          <h2 class="text-lg font-semibold text-gray-200 mb-3 border-b border-gray-700 pb-1">Description</h2>
          <div x-markdown="bead.description"></div>
        </section>
      </template>

      <!-- Dispatch History -->
      <template x-if="dispatchRun && dispatchRun.status === 'DONE'">
        <section aria-label="Dispatch History" class="mb-6">
          <h2 class="text-lg font-semibold text-gray-200 mb-3 border-b border-gray-700 pb-1">Dispatch History</h2>
          <div class="p-3 bg-gray-800 rounded border border-gray-700">
            <div class="flex items-center gap-3 flex-wrap text-sm mb-2">
              <span class="text-green-400 font-semibold" x-text="dispatchRun.status"></span>
              <template x-if="dispatchRun.duration_secs">
                <span class="text-gray-400" x-text="Math.floor(dispatchRun.duration_secs / 60) + 'm' + (dispatchRun.duration_secs % 60) + 's'"></span>
              </template>
              <template x-if="dispatchRun.commit_hash">
                <span class="font-mono text-xs text-gray-500" x-text="dispatchRun.commit_hash.slice(0, 7)"></span>
              </template>
            </div>
            <template x-if="dispatchRun.files_changed">
              <div class="text-xs text-gray-500 mb-2"
                   x-text="'+' + (dispatchRun.lines_added || 0) + ' -' + (dispatchRun.lines_removed || 0) + ' across ' + dispatchRun.files_changed + ' files'"></div>
            </template>
            <template x-if="dispatchRun.decision && dispatchRun.decision.scores">
              <div class="flex gap-4 text-xs">
                <template x-for="[k,v] in Object.entries(dispatchRun.decision.scores)" :key="k">
                  <span class="text-gray-400"><span class="text-gray-500" x-text="k"></span> <span class="text-gray-200 font-semibold" x-text="v"></span></span>
                </template>
              </div>
            </template>
            <template x-if="dispatchRun.decision && dispatchRun.decision.reason">
              <div class="text-sm text-gray-400 mt-2" x-text="dispatchRun.decision.reason"></div>
            </template>
          </div>
        </section>
      </template>

      <!-- Experience Report -->
      <template x-if="experienceReport">
        <section aria-label="Experience Report" class="mb-6">
          <h2 class="text-lg font-semibold text-gray-200 mb-3 border-b border-gray-700 pb-1">Experience Report</h2>
          <a :href="'/graph/' + experienceReport.source_id"
             class="block p-3 bg-gray-800 rounded border border-gray-700 hover:border-gray-500 no-underline">
            <div class="text-sm text-gray-200 mb-1" x-text="experienceReport.title"></div>
            <div class="text-xs text-gray-500" x-text="experienceReport.preview + '...'"></div>
          </a>
        </section>
      </template>

      <!-- Acceptance Criteria -->
      <template x-if="bead.acceptance_criteria">
        <section aria-label="Acceptance Criteria" class="mb-6">
          <h2 class="text-lg font-semibold text-gray-200 mb-3 border-b border-gray-700 pb-1">Acceptance Criteria</h2>
          <div x-markdown="bead.acceptance_criteria"></div>
        </section>
      </template>

      <!-- Design Notes -->
      <template x-if="bead.design">
        <section aria-label="Design Notes" class="mb-6">
          <h2 class="text-lg font-semibold text-gray-200 mb-3 border-b border-gray-700 pb-1">Design Notes</h2>
          <div x-markdown="bead.design"></div>
        </section>
      </template>

      <!-- Background — Original Discussions (provenance) -->
      <template x-if="primer && primer.provenance && primer.provenance.length > 0">
        <section aria-label="Background — Original Discussions" class="mb-6">
          <h2 class="text-lg font-semibold text-gray-200 mb-3 border-b border-gray-700 pb-1">Background — Original Discussions</h2>
          <template x-for="prov in primer.provenance" :key="prov.source_id">
            <div class="mb-3">
              <template x-if="prov.note">
                <div class="mb-2 text-sm text-gray-300">
                  <span class="text-gray-500" x-text="prov.relation + ':'"></span>
                  <span x-text="' ' + prov.note"></span>
                </div>
              </template>
              <template x-for="turn in (prov.turns || [])" :key="turn.turn_number">
                <div class="ml-3 mb-2 pl-3 border-l-2 border-gray-700">
                  <div class="text-xs mb-1"
                       :class="turn.role === 'USER' ? 'text-blue-400' : 'text-green-400'"
                       x-text="'Turn ' + turn.turn_number + ' — ' + turn.role"></div>
                  <div class="text-sm text-gray-300" x-text="turn.content_preview || turn.content || ''"></div>
                </div>
              </template>
              <div class="text-xs text-gray-500">
                Source: <a :href="'/graph/' + prov.source_id"
                           class="text-indigo-400 hover:underline font-mono text-xs"
                           x-text="prov.source_id.slice(0, 12)"></a>
              </div>
            </div>
          </template>
        </section>
      </template>

      <!-- Related Notes -->
      <template x-if="primer && primer.related_notes && primer.related_notes.length > 0">
        <section aria-label="Related Notes" class="mb-6">
          <h2 class="text-lg font-semibold text-gray-200 mb-3 border-b border-gray-700 pb-1">Related Notes</h2>
          <div class="space-y-2">
            <template x-for="note in primer.related_notes" :key="note.source_id">
              <div class="p-2 bg-gray-800 rounded border border-gray-700">
                <div class="text-sm text-gray-300 mb-1" x-text="note.content_preview || ''"></div>
                <div class="flex items-center gap-2 flex-wrap">
                  <a :href="'/graph/' + note.source_id"
                     class="text-indigo-400 hover:underline font-mono text-xs"
                     x-text="note.source_id.slice(0, 12)"></a>
                  <template x-for="tag in (note.tags || [])" :key="tag">
                    <span class="px-1.5 py-0.5 bg-gray-700 text-gray-400 text-xs rounded" x-text="tag"></span>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </section>
      </template>

      <!-- Known Pitfalls -->
      <template x-if="primer && primer.pitfalls && primer.pitfalls.length > 0">
        <section aria-label="Known Pitfalls" class="mb-6">
          <h2 class="text-lg font-semibold text-gray-200 mb-3 border-b border-gray-700 pb-1">Known Pitfalls</h2>
          <div class="space-y-2">
            <template x-for="pit in primer.pitfalls" :key="pit.source_id">
              <div class="p-2 bg-yellow-900/20 rounded border border-yellow-800/30">
                <div class="text-sm text-gray-300 mb-1" x-text="pit.content_preview || ''"></div>
                <div class="flex items-center gap-2 flex-wrap">
                  <a :href="'/graph/' + pit.source_id"
                     class="text-indigo-400 hover:underline font-mono text-xs"
                     x-text="pit.source_id.slice(0, 12)"></a>
                  <template x-for="tag in (pit.tags || [])" :key="tag">
                    <span class="px-1.5 py-0.5 bg-gray-700 text-gray-400 text-xs rounded" x-text="tag"></span>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </section>
      </template>

      <!-- Children -->
      <template x-if="primer && primer.related_beads && primer.related_beads.length > 0">
        <section aria-label="Children" class="mb-6">
          <h2 class="text-lg font-semibold text-gray-200 mb-3 border-b border-gray-700 pb-1">Children</h2>
          <div class="space-y-1">
            <template x-for="rb in primer.related_beads" :key="rb.bead_id || rb.id">
              <a :href="'/bead/' + (rb.bead_id || rb.id)"
                 :data-bead-id="rb.bead_id || rb.id"
                 class="block p-2 bg-gray-800 rounded border border-gray-700 hover:border-gray-500 no-underline">
                <div class="flex items-center gap-2">
                  <span class="badge" :class="'badge-' + (rb.status || 'open')" x-text="rb.status || 'open'"></span>
                  <span class="ft-badge" :class="'badge-p' + rb.priority" x-text="'P' + rb.priority"></span>
                  <span class="font-mono text-xs text-gray-500" x-text="rb.bead_id || rb.id"></span>
                  <span class="text-sm text-gray-200 flex-1" x-text="rb.title"></span>
                  <template x-if="rb.similarity != null">
                    <span class="text-xs text-gray-500" x-text="Math.round(rb.similarity * 100) + '% similar'"></span>
                  </template>
                </div>
                <template x-if="rb.description">
                  <div class="text-xs text-gray-500 mt-1 truncate" x-text="rb.description.slice(0, 120)"></div>
                </template>
              </a>
            </template>
          </div>
        </section>
      </template>

      <!-- Comments -->
      <template x-if="bead.comments && bead.comments.length > 0">
        <section aria-label="Comments" class="mb-6">
          <h2 class="text-lg font-semibold text-gray-200 mb-3 border-b border-gray-700 pb-1">Comments</h2>
          <div class="space-y-3">
            <template x-for="c in bead.comments" :key="c.id || c.created_at">
              <div class="pl-4 border-l-2 border-indigo-700/50">
                <div class="text-xs text-gray-500 mb-1" x-text="(c.author || '?') + ' · ' + formatTs(c.created_at)"></div>
                <div class="text-sm text-gray-300 prose prose-invert prose-sm max-w-none" x-markdown="c.text || ''"></div>
              </div>
            </template>
          </div>
        </section>
      </template>

      <!-- Live session link + spacer (shown when dispatch is running) -->
      <template x-if="isRunning">
        <div class="mb-6">
          <template x-if="runDir">
            <div class="flex items-center gap-3 mb-4">
              <a :href="'/dispatch/trace/' + runDir"
                 class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-700 hover:bg-indigo-600 text-white rounded-lg text-sm no-underline">
                <span class="live-pulse"></span>
                View Live Session
              </a>
              <button @click="showLivePanel(runDir)"
                      class="px-3 py-2 bg-gray-700 hover:bg-gray-600 text-gray-300 rounded-lg text-sm">
                Open Panel
              </button>
            </div>
          </template>
          <div style="height: 20rem;"></div>
        </div>
      </template>

      <!-- Trace link for completed beads -->
      <template x-if="!isRunning && runDir">
        <div class="mb-6">
          <a :href="'/dispatch/trace/' + runDir"
             class="inline-flex items-center gap-2 px-4 py-2 bg-gray-700 hover:bg-gray-600 text-gray-200 rounded-lg text-sm no-underline">
            View Trace
          </a>
        </div>
      </template>

    </div>
  </template>

</div>
