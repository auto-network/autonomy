<div x-data="dispatchPage()">

  <!-- Dispatcher pause banner (auth failure etc.) -->
  <template x-if="dispatcherState.paused && dispatcherState.reason">
    <div
      class="mb-4 px-4 py-3 rounded-lg border flex items-center justify-between gap-3 bg-red-900/30 border-red-600 text-red-200"
    >
      <div class="flex items-center gap-2">
        <span class="text-lg">&#x26D4;</span>
        <span x-show="dispatcherState.reason.reason === 'auth'">
          <strong>Dispatcher paused:</strong> Auth failed &mdash; re-authenticate then resume
        </span>
        <span x-show="dispatcherState.reason.reason !== 'auth'">
          <strong>Dispatcher paused:</strong> <span x-text="dispatcherState.reason.message || dispatcherState.reason.reason"></span>
        </span>
      </div>
      <button
        @click="resumeDispatcher()"
        class="px-3 py-1 rounded-md text-sm font-medium bg-red-600 hover:bg-red-500 text-white transition-colors flex-shrink-0"
      >
        Resume
      </button>
    </div>
  </template>

  <!-- Merge-blocked warning (UU files in working tree) -->
  <template x-if="dispatcherState?.merge_health?.status === 'blocked'">
    <div
      class="mb-4 px-4 py-3 rounded-lg border flex items-center gap-3 bg-amber-900/30 border-amber-600 text-amber-200"
    >
      <span class="text-lg">&#x26A0;</span>
      <div>
        <strong>Merges blocked:</strong>
        <span x-text="dispatcherState.merge_health.reason"></span>
        <template x-if="dispatcherState.merge_health.count > 1">
          <span x-text="'(' + dispatcherState.merge_health.count + ' unmerged files)'"></span>
        </template>
        <span class="text-amber-400 text-xs ml-2">Resolve conflicts manually, then resume</span>
      </div>
    </div>
  </template>

  <!-- Queue pause toggles + stats header -->
  <div class="flex flex-wrap items-center gap-3 mb-6">
    <template x-for="(isPaused, label) in paused" :key="label">
      <span class="inline-flex items-center gap-1.5">
        <button
          @click="togglePause(label)"
          class="flex items-center gap-1.5 px-3 py-1 rounded-full text-sm font-medium border transition-colors"
          :class="isPaused
            ? 'bg-red-900/40 border-red-600 text-red-300 hover:bg-red-900/60'
            : 'bg-green-900/40 border-green-600 text-green-300 hover:bg-green-900/60'"
          :title="isPaused ? label + ': paused — click to resume' : label + ': running — click to pause'"
        >
          <span
            class="inline-block w-2 h-2 rounded-full"
            :class="isPaused ? 'bg-red-500' : 'bg-green-500'"
          ></span>
          <span x-text="label"></span>
        </button>
        <span x-show="isPaused && reasons[label]" x-cloak class="text-xs text-red-400" x-text="reasons[label]"></span>
      </span>
    </template>
    <span class="text-gray-500 text-sm" x-show="active.length > 0">
      running: <span class="text-green-400" x-text="active.length"></span>
    </span>
    <span class="text-gray-500 text-sm" x-show="waiting.length > 0">
      queued: <span class="text-blue-400" x-text="waiting.length"></span>
    </span>
  </div>

  <!-- Active Dispatches -->
  <div class="mb-8">
    <h2 class="text-lg font-semibold mb-3 text-green-400">Active Dispatches</h2>
    <template x-if="active.length === 0">
      <div class="text-gray-500 text-sm">No active dispatches</div>
    </template>
    <template x-for="b in active" :key="b.id">
      {% include 'partials/bead-card.html' %}
    </template>
  </div>

  <!-- Approved — Waiting for Dispatch -->
  <div class="mb-8">
    <h2 class="text-lg font-semibold mb-3 text-blue-400">Approved — Waiting for Dispatch</h2>
    <template x-if="waiting.length === 0">
      <div class="text-gray-500 text-sm">No unblocked beads waiting</div>
    </template>
    <template x-for="b in waiting" :key="b.id">
      {% include 'partials/bead-card.html' %}
    </template>
  </div>

  <!-- Approved — Blocked -->
  <div class="mb-8">
    <h2 class="text-lg font-semibold mb-3 text-yellow-400">Approved — Blocked</h2>
    <template x-if="blocked.length === 0">
      <div class="text-gray-500 text-sm">No blocked beads</div>
    </template>
    <template x-for="b in blocked" :key="b.id">
      {% include 'partials/bead-card.html' %}
    </template>
  </div>

</div>
