<div x-data="searchPage()" class="pb-safe">

  <!-- No query -->
  <template x-if="state === 'idle'">
    <div class="text-gray-400">Enter a search query above</div>
  </template>

  <!-- Loading -->
  <template x-if="state === 'loading'">
    <div class="text-gray-500 text-sm">Searching...</div>
  </template>

  <!-- Error -->
  <template x-if="state === 'error'">
    <div class="text-red-400" x-text="errorMsg"></div>
  </template>

  <!-- Empty -->
  <template x-if="state === 'empty'">
    <div class="text-gray-400">No results found.</div>
  </template>

  <!-- Results -->
  <template x-if="state === 'ready'">
    <div>
      <div class="text-sm text-gray-500 mb-4" x-text="results.length + ' results'"></div>
      <section aria-label="Search Results" class="space-y-3">
        <template x-for="r in results" :key="r._key">
          <a :href="r._href"
             :data-source-id="r.source_id"
             class="block p-4 bg-gray-800 rounded-lg border border-gray-700 hover:border-indigo-500 transition-colors no-underline">
            <div class="text-sm font-medium mb-1 text-gray-100" x-text="r._headline"></div>
            <template x-if="r._preview">
              <div class="text-xs text-gray-500 leading-relaxed mb-2" x-text="r._preview"></div>
            </template>
            <div class="flex items-center gap-2">
              <span class="px-1.5 py-0.5 rounded text-xs"
                    :class="r._isUser ? 'bg-blue-900' : 'bg-gray-700'"
                    x-text="r._isUser ? 'YOU' : 'AI'"></span>
              <span class="text-xs text-gray-600" x-text="r._srcLabel"></span>
              <span class="text-xs text-gray-600" x-text="'t' + r._turn"></span>
              <template x-if="r.project">
                <span class="text-xs text-indigo-400" x-text="'[' + r.project + ']'"></span>
              </template>
              <span class="text-xs text-gray-700 font-mono ml-auto" x-text="'src:' + r._srcId"></span>
            </div>
          </a>
        </template>
      </section>
    </div>
  </template>

</div>
