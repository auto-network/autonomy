<div x-data="searchPage()" class="pb-safe">
  <!-- Query display + count -->
  <div class="flex items-center gap-3 mb-4">
    <h1 class="text-lg font-semibold text-indigo-400" x-text="'Search: ' + query"></h1>
    <span class="text-sm text-gray-500" x-show="loaded" x-text="results.length + ' results'"></span>
  </div>

  <div class="mb-4">
    {% include 'partials/zoom-toggle.html' %}
  </div>

  <!-- Loading -->
  <template x-if="!loaded">
    <div class="text-gray-500 text-sm">Searching...</div>
  </template>

  <!-- Results -->
  <template x-if="loaded && results.length > 0">
    <div class="flex flex-col" :class="zoom === 'compact' ? 'gap-1' : 'gap-1.5'">
      <template x-for="r in results" :key="r.source_id || r.id">
        <a :href="'/graph/' + (r.source_id || r.id).slice(0, 12)"
           @click.prevent="navigateTo('/graph/' + (r.source_id || r.id).slice(0, 12))"
           class="block rounded-lg overflow-clip">
          <div class="px-2.5 py-2 bg-gray-800 hover:bg-gray-750 border-l-4 transition-colors"
               :style="'border-left-color:' + typeColor(r.result_type)">
            <!-- Row 1: stats plate -->
            <div class="flex items-center gap-1.5" style="font-size:10px; font-family:ui-monospace,monospace; color:#4b5e73">
              <span style="font-size:11px; font-weight:500; color:#64748b" x-text="typeName(r.result_type)"></span>
              <template x-if="r.match_count > 1">
                <span style="color:#94a3b8; background:#0f1623; padding:1px 5px; border-radius:3px" x-text="r.match_count + ' matches'"></span>
              </template>
              <template x-if="r.project">
                <span style="background:#1e1b4b; color:#a5b4fc; padding:0 5px; border-radius:3px; font-size:9px; font-weight:700" x-text="r.project"></span>
              </template>
              <span class="ml-auto" style="color:#3d4f63" x-text="(r.source_id || r.id).slice(0, 12)"></span>
              <!-- Compact: title inline on stats row -->
              <template x-if="zoom === 'compact'">
                <span style="font-size:13px; font-weight:600; color:#f1f5f9; margin-left:6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap" x-text="r.source_title || 'Untitled'"></span>
              </template>
            </div>
            <!-- Row 2: title (normal/expanded) -->
            <div x-show="zoom !== 'compact'" style="font-size:14px; font-weight:600; color:#f1f5f9; line-height:1.3; margin-top:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap"
                 x-text="r.source_title || 'Untitled'"></div>
            <!-- Row 3: content preview with highlighting (normal/expanded) -->
            <div x-show="zoom !== 'compact'" class="mt-0.5 text-xs truncate" style="color:#6b7280"
                 x-html="highlightTerms(r.content || '', query)"></div>
            <!-- Row 4: tags (expanded only) -->
            <template x-if="zoom === 'expanded' && parseTags(r.tags).length > 0">
              <div class="flex gap-1 flex-wrap mt-1">
                <template x-for="t in parseTags(r.tags)" :key="t">
                  <a :href="'/stream/' + t" @click.prevent.stop="navigateTo('/stream/' + t)"
                     style="display:inline-flex; padding:1px 6px; border-radius:3px; font-size:10px; font-weight:500; background:#1e293b; color:#94a3b8; text-decoration:none"
                     x-text="t"></a>
                </template>
              </div>
            </template>
          </div>
        </a>
      </template>
    </div>
  </template>

  <!-- Empty -->
  <template x-if="loaded && results.length === 0">
    <div class="text-gray-500 text-sm">No results for "<span x-text="query"></span>"</div>
  </template>
</div>
