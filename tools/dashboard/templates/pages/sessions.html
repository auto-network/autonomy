<div x-data="sessionsPage()" class="pb-safe">

  <!-- Page-level toolbar: zoom (relocated from Active header) + create.
       Zoom is a global view preference and affects session cards across the page,
       so it lives above the sections rather than inside either section header. -->
  <div class="flex items-center gap-3 pb-3 mb-4 border-b border-gray-800 flex-wrap"
       data-testid="sessions-page-toolbar">
    {% include 'partials/zoom-toggle.html' %}
    <div class="flex-grow"></div>
    <div x-data="{ open: false }" class="relative" data-testid="session-launch-dropdown">
      <button @click="open = !open"
              :disabled="_creating"
              class="w-8 h-8 flex items-center justify-center rounded-lg
                     bg-green-600 hover:bg-green-500 text-white text-lg font-bold
                     transition-colors disabled:opacity-50 disabled:cursor-wait"
              :class="_creating && 'animate-pulse'">+</button>
      <div x-show="open" @click.away="open = false" x-cloak
           x-transition:enter="transition ease-out duration-100"
           x-transition:enter-start="opacity-0 scale-95"
           x-transition:enter-end="opacity-100 scale-100"
           x-transition:leave="transition ease-in duration-75"
           x-transition:leave-start="opacity-100 scale-100"
           x-transition:leave-end="opacity-0 scale-95"
           class="absolute right-0 mt-1 w-72 bg-gray-800 border border-gray-700
                  rounded-lg shadow-lg overflow-hidden z-30">

        <!-- Workspace groups (grouped by org) -->
        <template x-for="group in orgGroups" :key="group.org">
          <div class="py-1" :data-testid="'org-group-' + group.org">
            <div class="px-3 py-1.5 text-[10px] font-semibold uppercase tracking-wider"
                 :class="orgColorClass(group.org)"
                 x-text="group.org"
                 data-testid="org-header"></div>
            <template x-for="p in group.projects" :key="p.id">
              <button @click="$dispatch('create-terminal', {project: p.id}); open = false"
                      class="w-full px-3 py-2 text-left hover:bg-gray-700 transition-colors group"
                      :data-testid="'workspace-' + p.id">
                <div class="flex items-center gap-2">
                  <span class="text-sm font-semibold text-gray-200 group-hover:text-white"
                        x-text="p.name"></span>
                  <span x-show="p.dind"
                        class="text-[9px] px-1.5 py-0.5 rounded bg-gray-700 text-gray-400 font-medium"
                        data-testid="dind-badge">DinD</span>
                </div>
                <div class="text-xs text-gray-500 mt-0.5" x-text="p.description"></div>
              </button>
            </template>
          </div>
        </template>

        <!-- Separator -->
        <div class="border-t border-gray-700"></div>

        <!-- Host Terminal (standalone, not a workspace) -->
        <div class="py-1">
          <button @click="$dispatch('create-terminal', {type: 'host'}); open = false"
                  class="w-full px-3 py-2 text-left hover:bg-gray-700 transition-colors"
                  data-testid="host-terminal-option">
            <div class="text-sm text-gray-400">Host Terminal</div>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Active Sessions (interactive: host, chatwith, terminal) -->
  <section aria-label="Active Sessions" class="mb-8" data-testid="active-sessions-section">
    <div class="flex items-center gap-3 mb-3 flex-wrap">
      <h2 class="text-lg font-semibold text-green-400 leading-none">● Active Sessions</h2>
      {% with testid='active-sort-toggle',
              label='Sort:',
              value_expr='activeSort',
              options_expr='activeSortOptions' %}
        {% include 'partials/dropdown-toggle.html' %}
      {% endwith %}
    </div>
    <template x-if="interactive.length === 0">
      <div class="text-gray-500 text-sm">No active sessions</div>
    </template>
    <div class="sc-card-list" style="display:flex;flex-direction:column;gap:6px">
      <template x-for="s in sortedInteractive" :key="s.session_id">
        <div @click="navigate(s)" data-testid="session-card" :data-session-id="s.session_id">
          {% include 'partials/session-card.html' %}
        </div>
      </template>
    </div>
  </section>

  <!-- Recent Sessions — design: Resume Button + Type Filter (combined) -->
  <section aria-label="Recent Sessions" data-testid="recent-sessions-section">

    <!-- Section heading + filter chips (left-aligned) -->
    <div class="flex items-baseline gap-3 mb-3 flex-wrap">
      <h2 class="text-lg font-semibold text-gray-400 leading-none">Recent Sessions</h2>
      <div class="flex gap-1">
        <template x-for="opt in filterOptions" :key="opt.key">
          <button @click="setRecentFilter(opt.key)"
                  :class="recentFilter === opt.key ? 'bg-indigo-600 text-white' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'"
                  class="px-2.5 py-1 rounded-full text-xs font-medium transition-colors leading-none"
                  x-text="opt.label">
          </button>
        </template>
      </div>
    </div>

    <!-- Session cards — same structure as active session cards -->
    <div class="sc-card-list" style="display:flex;flex-direction:column;gap:6px">
      <template x-for="s in filtered" :key="s.id">
        <a :href="'/session/' + encodeURIComponent(s.project.replace(/^\[|\]$/g, '') || 'session') + '/' + encodeURIComponent(s.session_id)"
           class="no-underline" data-testid="recent-session-row" :data-session-id="s.session_id">
          {% include 'partials/session-card.html' %}
        </a>
      </template>
    </div>

    <!-- Empty states -->
    <template x-if="filtered.length === 0 && recent.length > 0">
      <div class="text-gray-500 text-sm py-2"
           x-text="'No ' + recentFilter + ' sessions'"
           data-testid="empty-filter-msg"></div>
    </template>
    <template x-if="recent.length === 0">
      <div class="text-gray-500 text-sm">No recent sessions</div>
    </template>

  </section>

  <template x-if="interactive.length === 0 && recent.length === 0 && !loading">
    <div class="text-gray-400">No sessions found</div>
  </template>

</div>
