<div x-data="sessionsPage()">

  <!-- Active Sessions (interactive: host, chatwith, terminal) -->
  <section aria-label="Active Sessions" class="mb-8">
    <h2 class="text-lg font-semibold mb-3 text-green-400">● Active Sessions</h2>
    <template x-if="interactive.length === 0">
      <div class="text-gray-500 text-sm">No active sessions</div>
    </template>
    <div class="space-y-2">
      <template x-for="s in interactive" :key="s.session_id">
        <a :href="'/session/' + encodeURIComponent(s.project) + '/' + s.session_id + (s.tmux_session ? '?tmux=' + encodeURIComponent(s.tmux_session) : '')"
           class="block p-4 bg-gray-800 rounded-lg border border-green-700 no-underline hover:bg-gray-750"
           :data-session-id="s.session_id">
          <div class="flex items-center gap-3 mb-2">
            <span class="w-2 h-2 rounded-full" :class="s.active ? 'bg-green-400' : 'bg-yellow-400'"></span>
            <span class="font-mono text-sm text-gray-400" x-text="s.session_id.slice(0, 12)"></span>
            <span class="text-xs text-indigo-400" x-text="'[' + s._project + ']'"></span>
            <span class="text-xs text-gray-500" x-text="s._sizeStr"></span>
            <span class="text-xs text-gray-500 ml-auto" x-text="s._ageStr"></span>
          </div>
          <div class="text-sm text-gray-300 truncate" x-text="s.latest || '...'"></div>
        </a>
      </template>
    </div>
  </section>

  <!-- Running Agents (dispatch, librarian) -->
  <section aria-label="Running Agents" class="mb-8">
    <h2 class="text-lg font-semibold mb-3 text-blue-400">⚙ Running Agents</h2>
    <template x-if="agents.length === 0">
      <div class="text-gray-500 text-sm">No running agents</div>
    </template>
    <div class="space-y-2">
      <template x-for="s in agents" :key="s.session_id">
        <a :href="'/session/' + encodeURIComponent(s.project) + '/' + s.session_id"
           class="block p-4 bg-gray-800 rounded-lg border border-blue-800 no-underline hover:bg-gray-750"
           :data-session-id="s.session_id">
          <div class="flex items-center gap-3 mb-2">
            <span class="w-2 h-2 rounded-full" :class="s.active ? 'bg-blue-400' : 'bg-gray-500'"></span>
            <span class="font-mono text-sm text-gray-400" x-text="s.session_id.slice(0, 12)"></span>
            <span class="text-xs text-indigo-400" x-text="'[' + s._project + ']'"></span>
            <span class="text-xs text-gray-500" x-text="s.type"></span>
            <span class="text-xs text-gray-500" x-text="s._sizeStr"></span>
            <span class="text-xs text-gray-500 ml-auto" x-text="s._ageStr"></span>
          </div>
          <div class="text-sm text-gray-300 truncate" x-text="s.latest || '...'"></div>
        </a>
      </template>
    </div>
  </section>

  <!-- Recent Sessions -->
  <section aria-label="Recent Sessions">
    <h2 class="text-lg font-semibold mb-3 text-gray-400">Recent Sessions</h2>
    <template x-if="recent.length === 0">
      <div class="text-gray-500 text-sm">No recent sessions</div>
    </template>
    <div class="space-y-2">
      <template x-for="s in recent" :key="s.id">
        <a :href="'/source/' + s.id"
           class="flex items-center gap-3 p-3 bg-gray-800 rounded-lg hover:bg-gray-750 border border-gray-700 no-underline"
           :data-session-id="s.id">
          <span class="font-mono text-xs text-gray-500" x-text="s.id.slice(0, 12)"></span>
          <span class="text-xs text-gray-400" x-text="s.date"></span>
          <span class="flex-1 truncate text-sm text-gray-200" x-text="s.title || ''"></span>
          <span class="text-xs text-indigo-400" x-text="s.project"></span>
        </a>
      </template>
    </div>
  </section>

  <template x-if="interactive.length === 0 && agents.length === 0 && recent.length === 0 && !loading">
    <div class="text-gray-400">No sessions found</div>
  </template>

</div>
