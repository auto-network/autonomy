<div x-data="sessionsPage()" class="pb-safe">

  <!-- Active Sessions (interactive: host, chatwith, terminal) -->
  <section aria-label="Active Sessions" class="mb-8">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-lg font-semibold text-green-400">● Active Sessions</h2>
      <div x-data="{ open: false }" class="relative">
        <button @click="open = !open"
                :disabled="_creating"
                class="w-8 h-8 flex items-center justify-center rounded-lg
                       bg-green-600 hover:bg-green-500 text-white text-lg font-bold
                       transition-colors disabled:opacity-50 disabled:cursor-wait"
                :class="_creating && 'animate-pulse'">+</button>
        <div x-show="open" @click.away="open = false" x-cloak
             class="absolute right-0 mt-1 w-48 bg-gray-800 border border-gray-700
                    rounded-lg shadow-lg overflow-hidden z-30">
          <button @click="$dispatch('create-terminal', {cmd: 'autonomy-agent-claude'}); open = false"
                  class="w-full px-4 py-2.5 text-left text-sm text-gray-200 hover:bg-gray-700">
            Container Terminal
          </button>
          <button @click="$dispatch('create-terminal', {cmd: 'claude --dangerously-skip-permissions'}); open = false"
                  class="w-full px-4 py-2.5 text-left text-sm text-gray-200 hover:bg-gray-700
                         border-t border-gray-700">
            Host Terminal
          </button>
        </div>
      </div>
    </div>
    <template x-if="interactive.length === 0">
      <div class="text-gray-500 text-sm">No active sessions</div>
    </template>
    <div class="space-y-2">
      <template x-for="s in interactive" :key="s.session_id">
        <div @click="navigate(s)"
             @touchstart="startLongPress(s, $event)"
             @touchend="cancelLongPress()"
             @touchmove="cancelLongPress()"
             @contextmenu.prevent
             class="block p-3 bg-gray-800 rounded-lg border border-green-700 hover:bg-gray-750 cursor-pointer select-none"
             :data-session-id="s.session_id">
          <div class="flex items-center gap-3 mb-1">
            <span class="w-2 h-2 rounded-full" :class="s.is_live ? 'bg-green-400' : 'bg-gray-500'"></span>
            <span class="font-medium text-sm text-gray-200 flex-1 truncate" x-text="s.label || s.tmux_session || s.session_id.slice(0, 12)"></span>
            <span class="text-xs text-gray-500" x-text="s._createdStr"></span>
          </div>
          <template x-if="s._hasData">
            <div class="flex items-center gap-2 pl-5">
              <span class="flex-1 text-sm text-gray-400 truncate" x-text="s.latest || '...'"></span>
              <span class="text-xs text-gray-600 whitespace-nowrap" x-text="s._lastActiveStr"></span>
            </div>
          </template>
        </div>
      </template>
    </div>
  </section>

  <!-- Running Agents (dispatch, librarian) -->
  <section aria-label="Running Agents" class="mb-8">
    <h2 class="text-lg font-semibold mb-3 text-blue-400">⚙ Running Agents</h2>
    <template x-if="agents.length === 0">
      <div class="text-gray-500 text-sm">No running agents</div>
    </template>
    <div class="space-y-2">
      <template x-for="s in agents" :key="s.session_id">
        <div @click="navigate(s)"
             @touchstart="startLongPress(s, $event)"
             @touchend="cancelLongPress()"
             @touchmove="cancelLongPress()"
             @contextmenu.prevent
             class="block p-3 bg-gray-800 rounded-lg border border-blue-800 hover:bg-gray-750 cursor-pointer select-none"
             :data-session-id="s.session_id">
          <div class="flex items-center gap-3 mb-1">
            <span class="w-2 h-2 rounded-full" :class="s.is_live ? 'bg-green-400' : 'bg-gray-500'"></span>
            <span class="font-medium text-sm text-gray-200 flex-1 truncate" x-text="s.label || (s.bead_id ? s.bead_id : s.tmux_session) || s.session_id.slice(0, 12)"></span>
            <span class="text-xs text-gray-500" x-text="s._createdStr"></span>
          </div>
          <template x-if="s._hasData">
            <div class="flex items-center gap-2 pl-5">
              <span class="flex-1 text-sm text-gray-400 truncate" x-text="s.latest || '...'"></span>
              <span class="text-xs text-gray-600 whitespace-nowrap" x-text="s._lastActiveStr"></span>
            </div>
          </template>
        </div>
      </template>
    </div>
  </section>

  <!-- Recent Sessions -->
  <section aria-label="Recent Sessions">
    <h2 class="text-lg font-semibold mb-3 text-gray-400">Recent Sessions</h2>
    <template x-if="recent.length === 0">
      <div class="text-gray-500 text-sm">No recent sessions</div>
    </template>
    <div class="space-y-2">
      <template x-for="s in recent" :key="s.id">
        <a :href="'/source/' + s.id"
           class="flex items-center gap-3 p-3 bg-gray-800 rounded-lg hover:bg-gray-750 border border-gray-700 no-underline"
           :data-session-id="s.id">
          <span class="font-mono text-xs text-gray-500" x-text="s.id.slice(0, 12)"></span>
          <span class="text-xs text-gray-400" x-text="s.date"></span>
          <span class="flex-1 truncate text-sm text-gray-200" x-text="s.title || ''"></span>
          <span class="text-xs text-indigo-400" x-text="s.project"></span>
        </a>
      </template>
    </div>
  </section>

  <template x-if="interactive.length === 0 && agents.length === 0 && recent.length === 0 && !loading">
    <div class="text-gray-400">No sessions found</div>
  </template>

  <!-- Action sheet for long press -->
  <div class="action-sheet-overlay" :class="actionSheet.open && 'active'" @click="closeActionSheet()"></div>
  <div class="action-sheet" :class="actionSheet.open && 'active'">
      <div class="action-sheet-group">
          <div class="action-sheet-title" x-text="actionSheet.title"></div>
          <button class="action-sheet-btn destructive" @click="confirmClose()">Close Session</button>
      </div>
      <div class="action-sheet-group">
          <button class="action-sheet-btn cancel" @click="closeActionSheet()">Cancel</button>
      </div>
  </div>

</div>
