<div x-data="sessionsPage()" class="pb-safe">

  <!-- Quick thought capture -->
  <div class="mb-4" x-data="{ thought: '', sending: false, sent: false }">
    <div class="flex gap-2">
      <input type="text" x-model="thought"
             placeholder="Capture a thought..."
             class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-emerald-500"
             @keydown.enter="if (thought.trim() && !sending) {
               sending = true;
               fetch('/api/graph/thought', { method: 'POST', headers: {'Content-Type': 'application/json'},
                 body: JSON.stringify({content: thought.trim(), actor: 'user'})
               }).then(r => r.json()).then(() => { thought = ''; sending = false; sent = true; setTimeout(() => sent = false, 2000); });
             }">
      <button @click="if (thought.trim() && !sending) {
                sending = true;
                fetch('/api/graph/thought', { method: 'POST', headers: {'Content-Type': 'application/json'},
                  body: JSON.stringify({content: thought.trim(), actor: 'user'})
                }).then(r => r.json()).then(() => { thought = ''; sending = false; sent = true; setTimeout(() => sent = false, 2000); });
              }"
              class="px-3 py-2 rounded-lg text-sm font-medium transition-colors"
              :class="sent ? 'bg-emerald-700 text-white' : 'bg-gray-700 hover:bg-gray-600 text-gray-300'"
              :disabled="sending || !thought.trim()"
              x-text="sent ? '✓' : 'Capture'">
      </button>
    </div>
  </div>

  <!-- Active Sessions (interactive: host, chatwith, terminal) -->
  <section aria-label="Active Sessions" class="mb-8">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-lg font-semibold text-green-400">● Active Sessions</h2>
      <div class="sc-zoom-bar" x-data>
        <button class="sc-zoom-btn" :class="$store.sessionZoom === 'compact' && 'active'"
                @click="setZoom('compact')" title="Compact">⊟</button>
        <button class="sc-zoom-btn" :class="$store.sessionZoom === 'normal' && 'active'"
                @click="setZoom('normal')" title="Normal">⊞</button>
        <button class="sc-zoom-btn" :class="$store.sessionZoom === 'expanded' && 'active'"
                @click="setZoom('expanded')" title="Expanded">⊡</button>
      </div>
      <div x-data="{ open: false }" class="relative">
        <button @click="open = !open"
                :disabled="_creating"
                class="w-8 h-8 flex items-center justify-center rounded-lg
                       bg-green-600 hover:bg-green-500 text-white text-lg font-bold
                       transition-colors disabled:opacity-50 disabled:cursor-wait"
                :class="_creating && 'animate-pulse'">+</button>
        <div x-show="open" @click.away="open = false" x-cloak
             class="absolute right-0 mt-1 w-48 bg-gray-800 border border-gray-700
                    rounded-lg shadow-lg overflow-hidden z-30">
          <button @click="$dispatch('create-terminal', {cmd: 'autonomy-agent-claude'}); open = false"
                  class="w-full px-4 py-2.5 text-left text-sm text-gray-200 hover:bg-gray-700">
            Container Terminal
          </button>
          <button @click="$dispatch('create-terminal', {cmd: 'claude --dangerously-skip-permissions'}); open = false"
                  class="w-full px-4 py-2.5 text-left text-sm text-gray-200 hover:bg-gray-700
                         border-t border-gray-700">
            Host Terminal
          </button>
        </div>
      </div>
    </div>
    <template x-if="interactive.length === 0">
      <div class="text-gray-500 text-sm">No active sessions</div>
    </template>
    <div class="sc-card-list" style="display:flex;flex-direction:column;gap:6px">
      <template x-for="s in interactive" :key="s.session_id">
        <div class="session-card-wrap">
          <div class="session-card"
               :class="s.type === 'host' ? 'session-card-host' : 'session-card-container'"
               @click="navigate(s)" data-testid="session-card"
               :data-session-id="s.session_id">
            <!-- Left indicator column -->
            <div class="sc-indicator">
              <span class="sc-dot" :class="s.is_live ? 'sc-dot-live' : 'sc-dot-dead'"></span>
              <template x-if="s.nag_enabled">
                <span class="sc-nag" title="Nag active">🔔</span>
              </template>
            </div>
            <!-- Content column -->
            <div class="sc-body">
              <!-- Row 1: stats row -->
              <div class="sc-stats">
                <template x-if="s._roleBadge">
                  <span class="sc-role" :class="s._roleCls" x-text="s._roleBadge"></span>
                </template>
                <template x-if="s._turnsStr">
                  <span class="session-stat-chip"
                        :class="s._ctxWarn ? 'session-stat-warn' : ''"
                        x-text="s._turnsStr + ' · ' + s._ctxStr"></span>
                </template>
                <span class="sc-tmux" x-text="s.tmux_session"></span>
                <span class="sc-recency" :class="s._recencyColor" x-text="s._lastActiveStr"></span>
                <button @click.stop="showSessionActions(s)" class="sc-actions"
                        data-testid="session-actions-btn" aria-label="Session actions">⋮</button>
              </div>
              <!-- Row 2: title -->
              <div class="sc-title" x-text="s.label || s.tmux_session || s.session_id.slice(0, 12)"></div>
              <!-- Row 3: topics (dot-separated) -->
              <template x-if="s.topics && s.topics.length > 0">
                <div class="sc-topics" x-text="s.topics.join(' · ')"></div>
              </template>
              <!-- Row 4: last message -->
              <template x-if="s._hasData">
                <div class="sc-message" x-text="s.latest || '...'"></div>
              </template>
              <!-- Footer (expanded only) -->
              <div class="sc-footer">
                <div class="sc-footer-item">
                  <span class="sc-footer-label">turns</span>
                  <span class="sc-footer-value" x-text="s._turnsStr || '—'"></span>
                </div>
                <div class="sc-footer-item">
                  <span class="sc-footer-label">ctx</span>
                  <span class="sc-footer-value" x-text="s._ctxStr || '—'"></span>
                </div>
                <div class="sc-footer-item">
                  <span class="sc-footer-label">idle</span>
                  <span class="sc-footer-value" x-text="s._lastActiveStr || '—'"></span>
                </div>
                <div class="sc-footer-item">
                  <span class="sc-footer-label">tmux</span>
                  <span class="sc-footer-value" x-text="s.tmux_session"></span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </template>
    </div>
  </section>

  <!-- Recent Sessions -->
  <section aria-label="Recent Sessions">
    <h2 class="text-lg font-semibold mb-3 text-gray-400">Recent Sessions</h2>
    <template x-if="recent.length === 0">
      <div class="text-gray-500 text-sm">No recent sessions</div>
    </template>
    <div class="space-y-2">
      <template x-for="s in recent" :key="s.id">
        <a :href="'/graph/' + s.id"
           class="flex items-center gap-3 p-3 bg-gray-800 rounded-lg hover:bg-gray-750 border border-gray-700 no-underline"
           :data-session-id="s.id">
          <span class="font-mono text-xs text-gray-500" x-text="s.id.slice(0, 12)"></span>
          <span class="text-xs text-gray-400" x-text="s.date"></span>
          <span class="flex-1 truncate text-sm text-gray-200" x-text="s.title || ''"></span>
          <span class="text-xs text-indigo-400" x-text="s.project"></span>
        </a>
      </template>
    </div>
  </section>

  <template x-if="interactive.length === 0 && recent.length === 0 && !loading">
    <div class="text-gray-400">No sessions found</div>
  </template>

</div>
