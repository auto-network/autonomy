<style>
/* ── Toolbar state classes (from Design Studio experiment a8ee8212) ── */

/* Chat toggle states (Alpine :class bindings) */
.chat-disconnected { color: #64748b; }
.chat-connected-hidden { color: #22c55e; }
.chat-connected-hidden:hover { background: rgba(34,197,94,0.1); }
.chat-open { background: #312e81; color: #a5b4fc; }
.chat-connected-shown { background: #14532d; color: #22c55e; }

/* Capture states (Alpine :class bindings) */
.capture-idle { color: #64748b; }
.capture-working { color: #a5b4fc; }
.capture-working svg { animation: toolbar-spin 1s linear infinite; }
.capture-success { color: #22c55e; }
.capture-error { color: #ef4444; }

/* Prime states (Alpine :class bindings) */
.prime-idle { color: #818cf8; }
.prime-idle:hover { background: #1e293b; color: #a5b4fc; }
.prime-working { color: #a5b4fc; }
.prime-working svg { animation: toolbar-spin 1s linear infinite; }
.prime-done { color: #22c55e; }

/* Disconnect hover */
.disconnect:hover { color: #f87171; background: rgba(239,68,68,0.08); }

@keyframes toolbar-spin { to { transform: rotate(360deg); } }

/* Session picker — from Design Studio experiment 3b9d8d82 */
.picker-list {
  flex: 1; overflow-y: auto;
  padding: 6px;
  display: flex; flex-direction: column; gap: 4px;
}
.picker-card-wrap { border-radius: 8px; overflow: clip; }
.picker-card {
  display: flex; flex-direction: column; gap: 2px;
  padding: 8px 10px;
  background: #0f1623;
  border: none;
  border-left: 4px solid #475569;
  cursor: pointer;
  transition: background 0.1s;
  width: 100%; text-align: left;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
}
.picker-card:hover { background: #162032; }
.picker-card:active { background: #1e2d3d; }
.picker-card-host { border-left-color: #3b82f6; }
.picker-stats {
  display: flex; align-items: center; gap: 3px;
  line-height: 1;
}
.picker-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0; vertical-align: 1px; margin-right: 1px;
}
.picker-dot-live { background: #22c55e; box-shadow: 0 0 4px rgba(34,197,94,0.4); }
.picker-dot-dead { background: #374151; }
.picker-role {
  display: inline-flex; align-items: center;
  padding: 1px 7px; border-radius: 4px;
  font-size: 11px; font-weight: 600;
  color: #cbd5e1; background: #2a3444;
  white-space: nowrap; flex-shrink: 0;
}
.picker-role-host { background: #1e3a5f; color: #93c5fd; }
.picker-tmux {
  font-size: 10px; color: #3d4f63;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  margin-left: auto; white-space: nowrap;
}
.picker-label {
  font-size: 14px; font-weight: 600; color: #f1f5f9;
  line-height: 1.25;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.picker-preview {
  font-size: 11px; color: #56657a; line-height: 1.25;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.picker-new {
  margin: 4px 6px 6px;
  padding: 10px 12px;
  background: #4338ca;
  border: none;
  border-radius: 8px;
  color: #e0e7ff;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.picker-new:hover { background: #4f46e5; }
.picker-count {
  font-size: 11px; color: #475569;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
}
</style>
<div x-data="experimentPage()" style="display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;padding-top:env(safe-area-inset-top, 0px)">

  <!-- Loading state -->
  <template x-if="state === 'loading'">
    <div style="flex:1;display:flex;align-items:center;justify-content:center;color:#9ca3af">Loading experiment...</div>
  </template>

  <!-- Error state -->
  <template x-if="state === 'error'">
    <div style="flex:1;display:flex;align-items:center;justify-content:center;color:#f87171">Experiment not found</div>
  </template>

  <!-- Main content — control strip + surface/chat + input bar -->
  <template x-if="state === 'ready'">
    <div style="display:flex;flex-direction:column;flex:1;min-height:0">

      <!-- ═══ UNIFIED TOOLBAR — from Design Studio experiment a8ee8212 ═══ -->
      <div data-testid="exp-toolbar"
           class="flex flex-wrap items-center px-3 bg-[#1a2332] border-b border-[#1e293b] min-h-[48px]"
           style="flex-shrink:0;z-index:10">

        <!-- Row 1 -->
        <div class="flex items-center gap-2 w-full h-12">

          <!-- Hamburger: shown mobile, hidden desktop -->
          <button data-testid="toolbar-hamburger"
                  @click="document.getElementById('sidebar').classList.toggle('-translate-x-full')"
                  class="md:hidden w-9 h-11 flex items-center justify-center bg-transparent border-none text-gray-500 cursor-pointer rounded-lg flex-shrink-0"
                  title="Toggle sidebar">
            <svg class="w-4 h-4" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="4" x2="14" y2="4"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="12" x2="14" y2="12"/></svg>
          </button>

          <!-- Experiment title -->
          <span data-testid="toolbar-title"
                class="flex-1 min-w-0 text-sm font-medium text-gray-400 truncate"
                :style="toolbarState === 'PICKER' ? 'color:#a5b4fc;font-weight:600' : ''"
                x-text="toolbarState === 'PICKER' ? 'Select Session' : (exp?.title || 'Experiment')"></span>

          <!-- Iter nav — desktop only -->
          <template x-if="toolbar.showIterNav">
            <div data-testid="toolbar-iter-desktop"
                 class="hidden md:flex flex-1 justify-center items-center gap-0.5 flex-shrink-0">
              <button @click="prevIteration()"
                      class="w-7 h-7 flex items-center justify-center bg-transparent border-none cursor-pointer rounded-md text-gray-500 hover:bg-gray-800 hover:text-gray-400 disabled:text-gray-700 disabled:cursor-default transition-all"
                      :disabled="!canGoBack" title="Previous">
                <svg class="w-3.5 h-3.5" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 2L4 7l5 5"/></svg>
              </button>
              <span class="text-xs font-mono text-gray-400 min-w-[2.25rem] text-center" x-text="(iterIndex + 1) === iterCount ? 'Latest' : (iterIndex + 1) + ' of ' + iterCount"></span>
              <button @click="nextIteration()"
                      class="w-7 h-7 flex items-center justify-center bg-transparent border-none cursor-pointer rounded-md text-gray-500 hover:bg-gray-800 hover:text-gray-400 disabled:text-gray-700 disabled:cursor-default transition-all"
                      :disabled="!canGoForward" title="Next">
                <svg class="w-3.5 h-3.5" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 2l5 5-5 5"/></svg>
              </button>
            </div>
          </template>

          <!-- Right actions -->
          <div class="flex items-center gap-1 flex-shrink-0">
            <!-- Capture — desktop only -->
            <template x-if="toolbar.captureVisible">
              <button data-testid="toolbar-capture"
                      @click="captureScreenshot()" :disabled="captureState === 'working'"
                      class="hidden md:flex w-11 h-11 items-center justify-center bg-transparent border-none cursor-pointer rounded-lg transition-all"
                      :class="'capture-' + captureState"
                      title="Capture screenshot">
                <template x-if="captureState === 'idle'"><svg class="w-[18px] h-[18px]" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3.5" width="14" height="11" rx="1.5"/><circle cx="9" cy="9" r="3"/></svg></template>
                <template x-if="captureState === 'working'"><svg class="w-[18px] h-[18px]" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="9" r="7" stroke-dasharray="34 12"/></svg></template>
                <template x-if="captureState === 'success'"><svg class="w-[18px] h-[18px]" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 9l4 4 6-7"/></svg></template>
                <template x-if="captureState === 'error'"><svg class="w-[18px] h-[18px]" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 5l8 8M13 5l-8 8"/></svg></template>
              </button>
            </template>

            <!-- Chat toggle -->
            <button data-testid="toolbar-chat-toggle"
                    @click="chatOpen = !chatOpen"
                    class="w-11 h-11 flex items-center justify-center bg-transparent border-none cursor-pointer rounded-lg transition-all"
                    :class="toolbar.chatIconClass" title="Toggle chat">
              <svg class="w-[18px] h-[18px]" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h14v9H6l-4 4V3z"/></svg>
            </button>
          </div>
        </div>

        <!-- Row 2a: iteration nav — mobile only -->
        <template x-if="toolbar.showIterNav">
          <div data-testid="toolbar-iter-mobile"
               class="flex md:hidden items-center w-full h-12 pb-0.5 justify-center relative">
            <div class="flex items-center gap-0.5">
              <button @click="prevIteration()"
                      class="w-7 h-7 flex items-center justify-center bg-transparent border-none cursor-pointer rounded-md text-gray-500 hover:bg-gray-800 hover:text-gray-400 disabled:text-gray-700 disabled:cursor-default transition-all"
                      :disabled="!canGoBack">
                <svg class="w-3.5 h-3.5" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 2L4 7l5 5"/></svg>
              </button>
              <span class="text-xs font-mono text-gray-400 min-w-[2.25rem] text-center" x-text="(iterIndex + 1) === iterCount ? 'Latest' : (iterIndex + 1) + ' of ' + iterCount"></span>
              <button @click="nextIteration()"
                      class="w-7 h-7 flex items-center justify-center bg-transparent border-none cursor-pointer rounded-md text-gray-500 hover:bg-gray-800 hover:text-gray-400 disabled:text-gray-700 disabled:cursor-default transition-all"
                      :disabled="!canGoForward">
                <svg class="w-3.5 h-3.5" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 2l5 5-5 5"/></svg>
              </button>
            </div>
            <!-- Capture — mobile position -->
            <template x-if="toolbar.captureVisible">
              <div class="absolute right-0 flex items-center">
                <button data-testid="toolbar-capture-mobile"
                        @click="captureScreenshot()" :disabled="captureState === 'working'"
                        class="w-11 h-11 flex items-center justify-center bg-transparent border-none cursor-pointer rounded-lg transition-all"
                        :class="'capture-' + captureState"
                        title="Capture screenshot">
                  <template x-if="captureState === 'idle'"><svg class="w-[18px] h-[18px]" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3.5" width="14" height="11" rx="1.5"/><circle cx="9" cy="9" r="3"/></svg></template>
                  <template x-if="captureState === 'working'"><svg class="w-[18px] h-[18px]" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="9" r="7" stroke-dasharray="34 12"/></svg></template>
                  <template x-if="captureState === 'success'"><svg class="w-[18px] h-[18px]" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 9l4 4 6-7"/></svg></template>
                  <template x-if="captureState === 'error'"><svg class="w-[18px] h-[18px]" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 5l8 8M13 5l-8 8"/></svg></template>
                </button>
              </div>
            </template>
          </div>
        </template>

        <!-- Row 2b: session row (LIVE_CHAT) -->
        <template x-if="toolbar.row2Session">
          <div data-testid="toolbar-session-row"
               class="flex items-center gap-1.5 w-full h-12 md:h-9 pb-0.5 md:pb-1">
            <span data-testid="toolbar-session-title"
                  class="flex-1 min-w-0 text-xs font-semibold text-green-500 truncate pl-0.5"
                  x-text="chatSessionLabel"></span>
            <div class="flex items-center gap-1 flex-shrink-0">
              <!-- Prime: icon-only mobile, text+icon desktop -->
              <button data-testid="toolbar-prime"
                      @click="injectPrimer()"
                      :disabled="primerState === 'working'"
                      class="w-11 h-11 md:w-auto md:h-8 md:px-2.5 flex items-center justify-center gap-1.5 bg-transparent border-none cursor-pointer rounded-lg text-xs font-semibold transition-all"
                      :class="primerState === 'working' ? 'prime-working' : primerState === 'done' ? 'prime-done' : 'prime-idle'"
                      :title="primerState === 'working' ? 'Injecting primer…' : primerState === 'done' ? 'Primer sent!' : 'Inject experiment context into session'">
                <template x-if="primerState === 'idle'"><svg class="w-[18px] h-[18px] md:w-3.5 md:h-3.5" viewBox="0 0 16 16" fill="currentColor"><path d="M8.5 1.5L3 9h4.5v5.5L13 7H8.5V1.5z"/></svg></template>
                <template x-if="primerState === 'working'"><svg class="w-[18px] h-[18px] md:w-3.5 md:h-3.5" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 1a7 7 0 017 7" stroke-linecap="round"/></svg></template>
                <template x-if="primerState === 'done'"><svg class="w-[18px] h-[18px] md:w-3.5 md:h-3.5" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8l4 4 6-7"/></svg></template>
                <span class="hidden md:inline" x-text="primerState === 'working' ? 'Priming…' : primerState === 'done' ? 'Primed' : 'Prime'"></span>
              </button>
              <!-- Disconnect: icon-only mobile, text+icon desktop -->
              <button data-testid="toolbar-disconnect"
                      @click="disconnectSession()"
                      class="w-11 h-11 md:w-auto md:h-8 md:px-2.5 flex items-center justify-center gap-1.5 bg-transparent border-none cursor-pointer rounded-lg text-xs font-semibold text-gray-500 transition-all disconnect"
                      title="Disconnect session">
                <svg class="w-[18px] h-[18px] md:w-3.5 md:h-3.5" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="9" cy="9" r="7"/><path d="M6.5 6.5l5 5M11.5 6.5l-5 5"/></svg>
                <span class="hidden md:inline">Disconnect</span>
              </button>
            </div>
          </div>
        </template>

      </div>

      <!-- Experiment surface (State 1: visible when chat closed) -->
      <div x-show="!chatOpen" style="flex:1;position:relative;overflow:hidden;min-height:0">
        <iframe id="exp-iframe" style="width:100%;height:100%;border:none;background:#0f1623"></iframe>
      </div>

      <!-- Chat overlay (State 2: visible when chat open) -->
      <div x-show="chatOpen" x-transition.opacity.duration.200ms
           class="flex" style="flex:1;flex-direction:column;background:#1a2332;overflow:hidden;min-height:0">

        <!-- Picker (when not connected) — from Design Studio experiment 3b9d8d82 -->
        <template x-if="!chatConnected">
          <div style="flex:1;display:flex;flex-direction:column;min-height:0">
            <!-- Count + refresh -->
            <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 10px 0">
              <span class="picker-count" x-text="chatSessions.length + ' available'"></span>
              <button @click="_loadChatSessions()" style="font-size:11px;color:#818cf8;background:transparent;border:none;cursor:pointer">Refresh</button>
            </div>
            <!-- Session list -->
            <div class="picker-list">
              <template x-if="chatSessions.length === 0">
                <div style="text-align:center;padding:24px;color:#475569;font-size:13px">No live sessions found</div>
              </template>
              <template x-for="sess in chatSessions" :key="sess.id">
                <div class="picker-card-wrap">
                  <button class="picker-card"
                          :class="{ 'picker-card-host': sess.isHost }"
                          @click="_connectSession(sess.id)">
                    <!-- Row 1: dot + role + tmux -->
                    <div class="picker-stats">
                      <span class="picker-dot" :class="sess.isLive ? 'picker-dot-live' : 'picker-dot-dead'"></span>
                      <template x-if="sess.role">
                        <span class="picker-role" :class="sess.isHost && 'picker-role-host'" x-text="sess.role"></span>
                      </template>
                      <span class="picker-tmux" x-text="sess.id"></span>
                    </div>
                    <!-- Row 2: label -->
                    <div class="picker-label" x-text="sess.label || sess.id"></div>
                    <!-- Row 3: preview -->
                    <template x-if="sess.preview">
                      <div class="picker-preview" x-text="sess.preview"></div>
                    </template>
                  </button>
                </div>
              </template>
            </div>
            <!-- + New Session -->
            <button @click="$dispatch('create-terminal', {cmd: 'autonomy-agent-claude'}); _loadChatSessions()"
                    class="picker-new">
              + New Session
            </button>
          </div>
        </template>

        <!-- Chat panel (when connected) — powered by unified session viewer -->
        <template x-if="chatConnected">
          <div id="exp-chat-panel" x-data="sessionViewerPage({mode:'panel'})" style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden">
            <!-- Scrollable entries container -->
            <div x-ref="entriesContainer" @scroll="onScroll()"
                 style="flex:1; overflow-y:auto; min-height:0; padding:8px;">
              {% include "partials/session-entries.html" %}
            </div>
            <!-- Screenshot injected indicator -->
            <div x-show="screenshotInjected" x-transition
                 class="px-2 py-1 bg-green-900/50 text-green-400 text-xs text-center flex-shrink-0">
              Screenshot injected into agent context
            </div>
            <!-- Input bar (shown when session is live and connected) -->
            <template x-if="isLive && _tmuxSession">
              <div class="flex flex-col px-2 bg-gray-800 border-t border-gray-700 flex-shrink-0"
                   style="padding-top:6px; padding-bottom:6px;"
                   @dragenter.prevent="$el.classList.add('drop-highlight')"
                   @dragover.prevent="$el.classList.add('drop-highlight')"
                   @dragleave.prevent="$el.classList.remove('drop-highlight')"
                   @drop.prevent="$el.classList.remove('drop-highlight'); addFiles($event.dataTransfer.files)">
                <!-- Attachment preview strip -->
                <div x-show="attachments.length > 0" class="flex" style="gap:6px; padding:2px 2px 4px; overflow:visible;">
                  <template x-for="att in attachments" :key="att.id">
                    <div class="thumb-wrap">
                      <template x-if="att.isImage && att.dataUrl">
                        <img :src="att.dataUrl">
                      </template>
                      <template x-if="!att.isImage || !att.dataUrl">
                        <div class="thumb-file">
                          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                          </svg>
                          <span x-text="att.name"></span>
                        </div>
                      </template>
                      <button class="thumb-x" @click="removeAttachment(att.id)">&times;</button>
                    </div>
                  </template>
                </div>
                <div class="flex gap-2 items-end">
                  <input type="file" x-ref="fileInput" accept="image/*,*/*" multiple class="hidden"
                         @change="addFiles($event.target.files); $event.target.value=''">
                  <button @click="$refs.fileInput.click()" :disabled="uploading" title="Attach file"
                          class="flex-shrink-0 flex items-center justify-center bg-transparent hover:bg-gray-700 text-gray-400 hover:text-gray-200 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed transition-colors duration-150"
                          style="width:40px; height:40px;">
                    <template x-if="!uploading">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                    </template>
                    <template x-if="uploading">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="animate-spin"><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg>
                    </template>
                  </button>
                  <textarea x-model="inputText" x-ref="messageInput"
                            @keydown.ctrl.enter.prevent="sendMessage()"
                            @keydown.meta.enter.prevent="sendMessage()"
                            @input="$el.style.height='auto'; let c=Math.min($el.scrollHeight,160); $el.style.height=c+'px'; $el.style.overflowY=$el.scrollHeight>160?'auto':'hidden'"
                            :placeholder="('ontouchstart' in window || window.innerWidth < 768) ? 'Message\u2026' : 'Message\u2026 (Ctrl+Enter to send)'"
                            rows="1" autocomplete="off" autocorrect="off" autocapitalize="sentences" enterkeyhint="send"
                            class="flex-1 bg-gray-700 text-gray-100 px-3 py-2 rounded-lg text-base leading-normal resize-none focus:outline-none border-2 border-transparent focus:border-indigo-500 font-sans transition-colors duration-150"
                            style="min-height: 40px; max-height: 160px; overflow-y: hidden;"></textarea>
                  <button @click="sendMessage()"
                          :disabled="(attachments.length === 0 && !inputText.trim()) || sending"
                          class="flex-shrink-0 px-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-sm font-semibold disabled:opacity-30 disabled:cursor-default whitespace-nowrap flex items-center justify-center gap-1.5 transition-colors duration-150"
                          style="height:40px;">
                    <template x-if="!sending">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </template>
                    <template x-if="sending">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="animate-spin"><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg>
                    </template>
                    <span x-text="sending ? 'Sending' : 'Send'"></span>
                  </button>
                </div>
              </div>
            </template>
          </div>
        </template>

      </div>


    </div>
  </template>


</div>
