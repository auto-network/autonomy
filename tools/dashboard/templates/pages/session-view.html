<div x-data="sessionViewerPage()" class="session-viewer">

  <!-- Loading -->
  <template x-if="state === 'loading'">
    <div class="text-gray-500 text-sm p-4">Connecting to session...</div>
  </template>

  <!-- Error -->
  <template x-if="state === 'error'">
    <div class="text-red-400 p-4" x-text="errorMsg"></div>
  </template>

  <!-- Main viewer -->
  <template x-if="state === 'ready'">
    <div class="sv-ready">

      <!-- ZONE 2: Session header — flex child, always visible at top -->
      <div class="sv-header">
        <span class="text-xs font-mono text-gray-500" x-text="sessionId.slice(0, 12)"></span>
        <span class="text-xs text-indigo-400" x-text="'[' + projectLabel + ']'"></span>
        <template x-if="isLive">
          <span class="flex items-center gap-1">
            <span class="live-pulse"></span>
            <span class="badge badge-open text-xs">Live</span>
          </span>
        </template>
        <template x-if="!isLive">
          <span class="badge badge-closed text-xs">Complete</span>
        </template>
        <span class="text-xs text-gray-500 ml-auto" x-show="!isLive" x-text="entries.length + ' total'"></span>
      </div>

      <!-- ZONE 3: Scrollable entries — fills all remaining space -->
      <div class="sv-entries" x-ref="entriesContainer" @scroll="onScroll()">

        <template x-for="(entry, idx) in entries" :key="idx">
          <div class="live-entry"
               :class="{
                 'live-entry-user': entry.type === 'user',
                 'live-entry-assistant': entry.type === 'assistant_text',
                 'live-entry-tool': entry.type === 'tool_use' || entry.type === 'tool_result',
                 'live-entry-thinking': entry.type === 'thinking',
                 'live-entry-system': entry.type === 'system',
               }">

            <!-- User message -->
            <template x-if="entry.type === 'user'">
              <div>
                <div class="flex items-center gap-2 mb-1">
                  <span class="text-xs text-blue-400 font-semibold">USER</span>
                  <span class="live-entry-time" x-text="formatTime(entry.timestamp)"></span>
                </div>
                <div class="text-sm text-gray-300" x-text="entry.content || ''"></div>
              </div>
            </template>

            <!-- Assistant text (markdown) -->
            <template x-if="entry.type === 'assistant_text'">
              <div>
                <div class="flex items-center gap-2 mb-1">
                  <span class="text-xs text-indigo-400 font-semibold">ASSISTANT</span>
                  <span class="live-entry-time" x-text="formatTime(entry.timestamp)"></span>
                </div>
                <div class="text-sm" x-markdown="entry.content || ''"></div>
              </div>
            </template>

            <!-- Tool use (collapsible) -->
            <template x-if="entry.type === 'tool_use'">
              <details class="text-sm">
                <summary class="live-tool-toggle text-purple-400 text-xs font-mono cursor-pointer select-none min-h-[44px] flex items-center">
                  <strong x-text="entry.tool_name || ''"></strong>
                  <span class="live-entry-time ml-2" x-text="formatTime(entry.timestamp)"></span>
                </summary>
                <pre class="text-xs text-gray-400 mt-1 overflow-x-auto max-h-32 overflow-y-auto bg-gray-800 rounded p-2"
                     x-text="JSON.stringify(entry.input || {}, null, 2)"></pre>
              </details>
            </template>

            <!-- Tool result (collapsible) -->
            <template x-if="entry.type === 'tool_result'">
              <details class="text-sm">
                <summary class="live-tool-toggle text-gray-500 text-xs font-mono cursor-pointer select-none min-h-[44px] flex items-center">
                  <span x-text="toolLabel(entry.tool_id)"></span>
                  <span class="text-gray-600 ml-1" x-text="(entry.content || '').slice(0, 80).replace(/\n/g, ' ')"></span>
                  <span class="live-entry-time ml-2" x-text="formatTime(entry.timestamp)"></span>
                </summary>
                <pre class="text-xs text-gray-400 mt-1 overflow-x-auto max-h-48 overflow-y-auto bg-gray-800 rounded p-2"
                     x-text="entry.content || ''"></pre>
              </details>
            </template>

            <!-- Thinking (collapsed by default) -->
            <template x-if="entry.type === 'thinking'">
              <details class="text-sm">
                <summary class="live-tool-toggle text-gray-600 text-xs min-h-[44px] flex items-center">
                  thinking...
                  <span class="live-entry-time ml-2" x-text="formatTime(entry.timestamp)"></span>
                </summary>
                <div class="text-xs text-gray-500 mt-1 italic" x-text="entry.content || ''"></div>
              </details>
            </template>

            <!-- System / harness message (compact, gray) -->
            <template x-if="entry.type === 'system'">
              <div class="flex items-center gap-2 py-0.5 text-xs text-gray-500 italic">
                <span class="opacity-60">&#9670;</span>
                <span x-text="entry.content || ''"></span>
                <span class="live-entry-time ml-auto" x-text="formatTime(entry.timestamp)"></span>
              </div>
            </template>

          </div>
        </template>

        <!-- Resume auto-scroll button -->
        <button x-show="!autoScroll && entries.length > 0"
                @click="resumeScroll()"
                class="live-resume-btn" style="display:block;">
          Resume auto-scroll
        </button>
      </div>

      <!-- ZONE 4: Input bar — flex child at bottom (shown when linked to tmux) -->
      <template x-if="isLive && _tmuxSession">
        <div class="sv-input"
             @dragenter.prevent="$el.classList.add('drop-highlight')"
             @dragover.prevent="$el.classList.add('drop-highlight')"
             @dragleave.prevent="$el.classList.remove('drop-highlight')"
             @drop.prevent="$el.classList.remove('drop-highlight'); addFiles($event.dataTransfer.files)">

          <!-- Attachment preview strip -->
          <div x-show="attachments.length > 0" class="flex" style="gap:6px; padding:6px 0.5rem 0; overflow:visible;">
            <template x-for="att in attachments" :key="att.id">
              <div class="thumb-wrap">
                <template x-if="att.isImage && att.dataUrl">
                  <img :src="att.dataUrl">
                </template>
                <template x-if="!att.isImage || !att.dataUrl">
                  <div class="thumb-file">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                      <polyline points="14 2 14 8 20 8"/>
                    </svg>
                    <span x-text="att.name"></span>
                  </div>
                </template>
                <button class="thumb-x" @click="removeAttachment(att.id)">&times;</button>
              </div>
            </template>
          </div>

          <div class="sv-input-row">
            <!-- Hidden file input -->
            <input type="file"
                   x-ref="fileInput"
                   accept="image/*,*/*"
                   multiple
                   class="hidden"
                   @change="addFiles($event.target.files); $event.target.value=''">

            <!-- Attach button (SVG paperclip) -->
            <button @click="$refs.fileInput.click()"
                    :disabled="uploading"
                    title="Attach file"
                    class="flex-shrink-0 flex items-center justify-center
                           bg-transparent hover:bg-gray-700 text-gray-400 hover:text-gray-200
                           rounded-lg disabled:opacity-50 disabled:cursor-not-allowed
                           transition-colors duration-150"
                    style="width:36px; height:36px;">
              <template x-if="!uploading">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              </template>
              <template x-if="uploading">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="animate-spin"><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg>
              </template>
            </button>

            <!-- Message textarea -->
            <textarea x-model="inputText"
                      x-ref="messageInput"
                      @keydown.ctrl.enter.prevent="sendMessage()"
                      @keydown.meta.enter.prevent="sendMessage()"
                      @input="$el.style.height='auto'; let c=Math.min($el.scrollHeight,160); $el.style.height=c+'px'; $el.style.overflowY=$el.scrollHeight>160?'auto':'hidden'"
                      :placeholder="'ontouchstart' in window ? 'Message\u2026' : 'Message\u2026 (Ctrl+Enter to send)'"
                      rows="1"
                      autocomplete="off"
                      autocorrect="off"
                      autocapitalize="sentences"
                      enterkeyhint="send"
                      class="flex-1 bg-gray-700 text-gray-100 rounded-lg text-base leading-normal
                             resize-none focus:outline-none border-2 border-transparent focus:border-indigo-500
                             font-sans transition-colors duration-150"
                      style="min-height: 36px; max-height: 160px; overflow-y: hidden; padding: 6px 12px;"></textarea>

            <!-- Send button (SVG arrow + label) -->
            <button @click="sendMessage()"
                    :disabled="(attachments.length === 0 && !inputText.trim()) || sending"
                    class="flex-shrink-0 px-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-sm font-semibold
                           disabled:opacity-30 disabled:cursor-default
                           whitespace-nowrap flex items-center justify-center gap-1.5
                           transition-colors duration-150"
                    style="height:36px;">
              <template x-if="!sending">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
              </template>
              <template x-if="sending">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="animate-spin"><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg>
              </template>
              <span x-text="sending ? 'Sending' : 'Send'"></span>
            </button>
          </div>
        </div>
      </template>

      <!-- ZONE 4 alt: Link Terminal — flex child at bottom -->
      <template x-if="isLive && !_tmuxSession && sessionType === 'host'">
        <div class="sv-input">

          <!-- Idle: show Link Terminal button -->
          <template x-if="linkState === 'idle'">
            <button @click="showLinkPicker()"
                    class="w-full min-h-[44px] bg-amber-700 hover:bg-amber-600 text-white rounded-lg text-sm font-medium">
              Link Terminal
            </button>
          </template>

          <!-- Picking: show candidate list -->
          <template x-if="linkState === 'picking'">
            <div class="space-y-2">
              <div class="text-xs text-gray-400 font-medium">Select a tmux session to link:</div>

              <template x-if="linkCandidates.length === 0">
                <div class="text-xs text-gray-500 py-2">No unclaimed terminals available</div>
              </template>

              <template x-for="(c, ci) in linkCandidates" :key="c.tmux_session">
                <label class="flex items-center gap-2 p-2 rounded cursor-pointer hover:bg-gray-700"
                       :class="selectedTmux === c.tmux_session ? 'bg-gray-700 ring-1 ring-amber-500' : ''">
                  <input type="radio" name="link-tmux" :value="c.tmux_session"
                         x-model="selectedTmux" class="accent-amber-500">
                  <span class="text-sm text-gray-200 font-mono" x-text="c.tmux_session"></span>
                  <span class="text-xs text-gray-500" x-text="Math.floor(c.elapsed_seconds / 60) + 'm ago'"></span>
                  <span class="text-xs text-gray-600 truncate max-w-[200px]" x-text="c.cmd"></span>
                </label>
              </template>

              <div class="flex gap-2">
                <button @click="resetLink()"
                        class="flex-1 min-h-[44px] bg-gray-700 hover:bg-gray-600 text-gray-300 rounded-lg text-sm">
                  Cancel
                </button>
                <button @click="confirmLink()"
                        :disabled="!selectedTmux"
                        class="flex-1 min-h-[44px] bg-amber-700 hover:bg-amber-600 text-white rounded-lg text-sm font-medium
                               disabled:opacity-50 disabled:cursor-not-allowed">
                  Confirm Link
                </button>
              </div>
            </div>
          </template>

          <!-- Handshaking: spinner -->
          <template x-if="linkState === 'handshaking'">
            <div class="flex items-center justify-center gap-2 py-3">
              <span class="animate-spin text-amber-400">&#x21BB;</span>
              <span class="text-sm text-gray-400">Sending handshake&hellip;</span>
            </div>
          </template>

          <!-- Failed: error + retry -->
          <template x-if="linkState === 'failed'">
            <div class="space-y-2">
              <div class="text-sm text-red-400" x-text="linkError"></div>
              <button @click="resetLink()"
                      class="w-full min-h-[44px] bg-amber-700 hover:bg-amber-600 text-white rounded-lg text-sm font-medium">
                Try Again
              </button>
            </div>
          </template>

        </div>
      </template>

    </div>
  </template>

</div>
