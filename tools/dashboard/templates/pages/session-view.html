<div x-data="sessionViewerPage()" class="session-viewer">

  <!-- Loading -->
  <template x-if="state === 'loading'">
    <div class="text-gray-500 text-sm p-4">
      <template x-if="loadProgress > 0">
        <span>
          Loading session...
          <span x-text="loadedMB + ' / ' + totalMB + ' MB'"></span>
          <span x-text="'(' + loadProgress + '%)'"></span>
        </span>
      </template>
      <template x-if="loadProgress === 0">
        <span>Connecting to session...</span>
      </template>
    </div>
  </template>

  <!-- Error -->
  <template x-if="state === 'error'">
    <div class="text-red-400 p-4" x-text="errorMsg"></div>
  </template>

  <!-- Main viewer -->
  <template x-if="state === 'ready'">
    <div class="sv-ready">

      <!-- ZONE 2: Session header — flex child, always visible at top -->
      <div class="sv-header" data-testid="session-header">
        <!-- Inline-editable label (live sessions) or static label -->
        <template x-if="_tmuxSession && isLive">
          <span class="text-sm font-medium text-gray-200 cursor-pointer hover:text-white border-b border-transparent hover:border-gray-500 min-w-[60px]"
                data-testid="session-label-edit"
                contenteditable="true"
                @blur="saveLabel($event)"
                @keydown.enter.prevent="$event.target.blur()"
                @keydown.escape.prevent="$event.target.textContent = _label || _tmuxSession; $event.target.blur()"
                x-text="_label || _tmuxSession"
                title="Click to edit label"></span>
        </template>
        <template x-if="_tmuxSession && !isLive">
          <span class="text-sm font-medium text-gray-200" x-text="_label || _tmuxSession"></span>
        </template>
        <template x-if="!_tmuxSession">
          <span class="text-sm font-medium text-gray-400" x-text="sessionId.slice(0, 12)"></span>
        </template>
        <span class="flex items-center gap-1.5 ml-auto">
          <template x-if="!isLive">
            <span class="text-xs text-gray-500" x-text="entries.length + ' entries'"></span>
          </template>
          <span class="text-xs text-gray-500" x-show="contextTokens > 0"
                x-text="Math.round(contextTokens / 1000) + 'k'"></span>
          <span class="w-2 h-2 rounded-full" :class="isLive ? 'bg-green-400' : 'bg-gray-500'"></span>
        </span>
      </div>

      <!-- ZONE 3: Scrollable entries — fills all remaining space -->
      <div class="sv-entries" x-ref="entriesContainer" @scroll="onScroll()">

        <!-- Empty state for new sessions with no entries yet -->
        <template x-if="entries.length === 0">
          <div style="display: flex; align-items: center; justify-content: center; height: 100%;">
            <div class="text-center text-gray-500">
              <div class="text-sm">Session started</div>
              <div class="text-xs mt-1 text-gray-600">Send a message to begin</div>
            </div>
          </div>
        </template>

        <template x-for="(dEntry, dIdx) in displayEntries" :key="dIdx">
          <div>

            <!-- ── Grouped tool calls (combined card) ────────── -->
            <template x-if="dEntry.type === 'tool_group'">
              <div class="sc-entry"
                   :class="[borderClass(dEntry), hasGap(dIdx) ? 'sc-gap' : '']">
                <div>
                  <!-- Header: chip + count + aggregated meta + timestamp -->
                  <div class="sc-line1">
                    <span class="sc-chip" :class="chipClass(dEntry.tool_name)" x-text="dEntry.tool_name"></span>
                    <span class="sc-meta sc-meta-gray" x-text="'\u00d7' + dEntry.items.length"></span>
                    <template x-for="badge in groupMeta(dEntry)" :key="badge.text">
                      <span class="sc-meta" :class="badge.cls" x-text="badge.text"></span>
                    </template>
                    <span class="sc-timestamp" x-text="formatTime(dEntry.timestamp)"></span>
                  </div>
                  <!-- Per-invocation lines -->
                  <template x-for="(item, subIdx) in dEntry.items" :key="subIdx">
                    <div>
                      <div class="sc-group-item" @click="toggleGroupItem(dIdx, subIdx)">
                        <template x-if="dEntry.tool_name === 'Bash'">
                          <span class="sc-group-status" :style="bashStatusColor(item)" x-text="bashStatus(item)"></span>
                        </template>
                        <span class="sc-group-item-text" x-text="headline(item)"></span>
                      </div>
                      <!-- Expanded detail panel (accordion — one at a time) -->
                      <template x-if="isGroupItemExpanded(dIdx, subIdx)">
                        <div @click.stop>
                          <div class="sc-detail-tabs" @click="toggleGroupItemView(dIdx, subIdx)">
                            <span class="sc-detail-tab"
                                  :class="groupItemViewMode(dIdx, subIdx) === 'output' ? 'sc-detail-tab-active' : ''">Output</span>
                            <span class="sc-detail-tab"
                                  :class="groupItemViewMode(dIdx, subIdx) === 'input' ? 'sc-detail-tab-active' : ''">Input</span>
                          </div>
                          <pre class="sc-detail" x-text="groupItemExpandContent(item, dIdx, subIdx)"></pre>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <!-- ── Regular entries (skip tool_result) ────────── -->
            <template x-if="dEntry.type !== 'tool_result' && dEntry.type !== 'tool_group'">
              <div class="sc-entry"
                   :class="[
                     borderClass(dEntry),
                     hasGap(dIdx) ? 'sc-gap' : '',
                     dEntry.type === 'user' ? 'sc-entry-user' : '',
                     dEntry.type === 'assistant_text' ? 'sc-entry-assistant' : '',
                     dEntry.type === 'thinking' ? 'sc-entry-thinking' : '',
                     dEntry.type === 'system' ? 'sc-entry-system' : '',
                     dEntry.type === 'crosstalk' ? 'sc-entry-crosstalk' : '',
                   ]">

                <!-- ── User message ────────────────────────────── -->
                <template x-if="dEntry.type === 'user'">
                  <div>
                    <div class="flex items-center gap-2 mb-1">
                      <span class="sc-user-label">USER</span>
                      <span class="sc-timestamp" x-text="formatTime(dEntry.timestamp)"></span>
                    </div>
                    <div class="sc-user-content" x-text="dEntry.content || ''"></div>
                  </div>
                </template>

                <!-- ── Assistant text (markdown) ───────────────── -->
                <template x-if="dEntry.type === 'assistant_text'">
                  <div>
                    <div class="flex items-center gap-2 mb-1">
                      <span class="sc-asst-label">ASSISTANT</span>
                      <span class="sc-timestamp" x-text="formatTime(dEntry.timestamp)"></span>
                    </div>
                    <div class="sc-asst-content" x-markdown="dEntry.content || ''"></div>
                  </div>
                </template>

                <!-- ── Tool use: two-line chip card ────────────── -->
                <template x-if="dEntry.type === 'tool_use'">
                  <div class="sc-tool-card" @click="toggleExpand(dIdx)">
                    <!-- Line 1: chip + meta + timestamp -->
                    <div class="sc-line1">
                      <span class="sc-chip" :class="chipClass(dEntry.tool_name)" x-text="dEntry.tool_name || '?'"></span>
                      <template x-for="badge in metaDisplay(dEntry)" :key="badge.text">
                        <span class="sc-meta" :class="badge.cls" x-text="badge.text"></span>
                      </template>
                      <span class="sc-timestamp" x-text="formatTime(dEntry.timestamp)"></span>
                    </div>
                    <!-- Line 2: headline -->
                    <div class="sc-line2"
                         :class="isExpanded(dIdx) ? 'sc-line2-expanded' : 'sc-line2-truncated'"
                         x-text="headline(dEntry)"></div>
                    <!-- Detail panel (expanded) -->
                    <template x-if="isExpanded(dIdx)">
                      <div @click.stop>
                        <div class="sc-detail-tabs" @click="toggleView(dIdx)">
                          <span class="sc-detail-tab"
                                :class="expandViewMode(dIdx) === 'output' ? 'sc-detail-tab-active' : ''"
                                >Output</span>
                          <span class="sc-detail-tab"
                                :class="expandViewMode(dIdx) === 'input' ? 'sc-detail-tab-active' : ''"
                                >Input</span>
                        </div>
                        <pre class="sc-detail" x-text="expandContent(dEntry, dIdx)"></pre>
                      </div>
                    </template>
                  </div>
                </template>

                <!-- ── Thinking (collapsed by default) ─────────── -->
                <template x-if="dEntry.type === 'thinking'">
                  <div class="sc-tool-card" @click="toggleExpand(dIdx)">
                    <div class="sc-line1">
                      <span class="sc-think-label">thinking...</span>
                      <span class="sc-timestamp" x-text="formatTime(dEntry.timestamp)"></span>
                    </div>
                    <template x-if="isExpanded(dIdx)">
                      <div class="sc-detail" style="font-style: italic;" x-text="dEntry.content || ''"></div>
                    </template>
                  </div>
                </template>

                <!-- ── System / harness message ────────────────── -->
                <template x-if="dEntry.type === 'system'">
                  <div class="sc-tool-card" @click="toggleExpand(dIdx)">
                    <div class="flex items-center gap-2">
                      <span class="sc-sys-icon" :style="sysIconColor(dEntry)" x-text="sysIcon(dEntry)"></span>
                      <span class="sc-sys-label" x-text="dEntry.content || ''"></span>
                      <span class="sc-timestamp" x-text="formatTime(dEntry.timestamp)"></span>
                    </div>
                    <template x-if="isExpanded(dIdx)">
                      <div class="sc-detail" x-text="dEntry.content || ''"></div>
                    </template>
                  </div>
                </template>

                <!-- ── CrossTalk peer message ──────────────────── -->
                <template x-if="dEntry.type === 'crosstalk'">
                  <div>
                    <div class="flex items-center gap-2 mb-1">
                      <span class="sc-ct-label">CROSSTALK</span>
                      <template x-if="dEntry.source_id">
                        <a class="sc-ct-sender"
                           :href="'/source/' + dEntry.source_id"
                           x-text="dEntry.sender_label || dEntry.sender"></a>
                      </template>
                      <template x-if="!dEntry.source_id">
                        <span class="sc-ct-sender"
                              x-text="dEntry.sender_label || dEntry.sender"></span>
                      </template>
                      <span class="sc-timestamp" x-text="formatTime(dEntry.timestamp)"></span>
                    </div>
                    <div class="sc-ct-content" x-text="dEntry.content || ''"></div>
                    <div class="sc-ct-provenance" x-show="dEntry.source_id">
                      <a :href="'/source/' + dEntry.source_id + '?turn=' + dEntry.turn">
                        <span x-text="'turn ' + dEntry.turn"></span>
                      </a>
                    </div>
                  </div>
                </template>

              </div>
            </template>

          </div>
        </template>

        <!-- Resume auto-scroll button -->
        <button x-show="!autoScroll && entries.length > 0"
                @click="resumeScroll()"
                class="live-resume-btn" style="display:block;">
          Resume auto-scroll
        </button>
      </div>

      <!-- ZONE 4: Input bar — flex child at bottom (shown when linked to tmux) -->
      <template x-if="isLive && _tmuxSession">
        <div class="sv-input"
             @dragenter.prevent="$el.classList.add('drop-highlight')"
             @dragover.prevent="$el.classList.add('drop-highlight')"
             @dragleave.prevent="$el.classList.remove('drop-highlight')"
             @drop.prevent="$el.classList.remove('drop-highlight'); addFiles($event.dataTransfer.files)">

          <!-- Attachment preview strip -->
          <div x-show="attachments.length > 0" class="flex" style="gap:6px; padding:6px 0.5rem 0; overflow:visible;">
            <template x-for="att in attachments" :key="att.id">
              <div class="thumb-wrap">
                <template x-if="att.isImage && att.dataUrl">
                  <img :src="att.dataUrl">
                </template>
                <template x-if="!att.isImage || !att.dataUrl">
                  <div class="thumb-file">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                      <polyline points="14 2 14 8 20 8"/>
                    </svg>
                    <span x-text="att.name"></span>
                  </div>
                </template>
                <button class="thumb-x" @click="removeAttachment(att.id)">&times;</button>
              </div>
            </template>
          </div>

          <div class="sv-input-row">
            <!-- Hidden file input -->
            <input type="file"
                   x-ref="fileInput"
                   accept="image/*,*/*"
                   multiple
                   class="hidden"
                   @change="addFiles($event.target.files); $event.target.value=''">

            <!-- Attach button (SVG paperclip) -->
            <button @click="$refs.fileInput.click()"
                    :disabled="uploading"
                    title="Attach file"
                    class="flex-shrink-0 flex items-center justify-center
                           bg-transparent hover:bg-gray-700 text-gray-400 hover:text-gray-200
                           rounded-lg disabled:opacity-50 disabled:cursor-not-allowed
                           transition-colors duration-150"
                    style="width:36px; height:36px;">
              <template x-if="!uploading">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              </template>
              <template x-if="uploading">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="animate-spin"><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg>
              </template>
            </button>

            <!-- Message textarea -->
            <textarea x-model="inputText"
                      x-ref="messageInput"
                      @keydown.ctrl.enter.prevent="sendMessage()"
                      @keydown.meta.enter.prevent="sendMessage()"
                      @input="$el.style.height='auto'; let c=Math.min($el.scrollHeight,160); $el.style.height=c+'px'; $el.style.overflowY=$el.scrollHeight>160?'auto':'hidden'"
                      :placeholder="('ontouchstart' in window || window.innerWidth < 768) ? 'Message\u2026' : 'Message\u2026 (Ctrl+Enter to send)'"
                      rows="1"
                      autocomplete="off"
                      autocorrect="off"
                      autocapitalize="sentences"
                      enterkeyhint="send"
                      class="flex-1 bg-gray-700 text-gray-100 rounded-lg text-base leading-normal
                             resize-none focus:outline-none border-2 border-transparent focus:border-indigo-500
                             font-sans transition-colors duration-150"
                      style="min-height: 36px; max-height: 160px; overflow-y: hidden; padding: 6px 12px;"></textarea>

            <!-- Send button (SVG arrow + label) -->
            <button @click="sendMessage()"
                    :disabled="(attachments.length === 0 && !inputText.trim()) || sending"
                    class="flex-shrink-0 px-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-sm font-semibold
                           disabled:opacity-30 disabled:cursor-default
                           whitespace-nowrap flex items-center justify-center gap-1.5
                           transition-colors duration-150"
                    style="height:36px;">
              <template x-if="!sending">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
              </template>
              <template x-if="sending">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="animate-spin"><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg>
              </template>
              <span x-text="sending ? 'Sending' : 'Send'"></span>
            </button>
          </div>
        </div>
      </template>

      <!-- ZONE 4 alt: Link Terminal — flex child at bottom -->
      <template x-if="isLive && !_tmuxSession && sessionType === 'host'">
        <div class="sv-input">

          <!-- Idle: show Link Terminal button -->
          <template x-if="linkState === 'idle'">
            <button @click="showLinkPicker()"
                    class="w-full min-h-[44px] bg-amber-700 hover:bg-amber-600 text-white rounded-lg text-sm font-medium">
              Link Terminal
            </button>
          </template>

          <!-- Picking: show candidate list -->
          <template x-if="linkState === 'picking'">
            <div class="space-y-2">
              <div class="text-xs text-gray-400 font-medium">Select a tmux session to link:</div>

              <template x-if="linkCandidates.length === 0">
                <div class="text-xs text-gray-500 py-2">No unclaimed terminals available</div>
              </template>

              <template x-for="(c, ci) in linkCandidates" :key="c.tmux_session">
                <label class="flex items-center gap-2 p-2 rounded cursor-pointer hover:bg-gray-700"
                       :class="selectedTmux === c.tmux_session ? 'bg-gray-700 ring-1 ring-amber-500' : ''">
                  <input type="radio" name="link-tmux" :value="c.tmux_session"
                         x-model="selectedTmux" class="accent-amber-500">
                  <span class="text-sm text-gray-200 font-mono" x-text="c.tmux_session"></span>
                  <span class="text-xs text-gray-500" x-text="Math.floor(c.elapsed_seconds / 60) + 'm ago'"></span>
                  <span class="text-xs text-gray-600 truncate max-w-[200px]" x-text="c.cmd"></span>
                </label>
              </template>

              <div class="flex gap-2">
                <button @click="resetLink()"
                        class="flex-1 min-h-[44px] bg-gray-700 hover:bg-gray-600 text-gray-300 rounded-lg text-sm">
                  Cancel
                </button>
                <button @click="confirmLink()"
                        :disabled="!selectedTmux"
                        class="flex-1 min-h-[44px] bg-amber-700 hover:bg-amber-600 text-white rounded-lg text-sm font-medium
                               disabled:opacity-50 disabled:cursor-not-allowed">
                  Confirm Link
                </button>
              </div>
            </div>
          </template>

          <!-- Handshaking: spinner -->
          <template x-if="linkState === 'handshaking'">
            <div class="flex items-center justify-center gap-2 py-3">
              <span class="animate-spin text-amber-400">&#x21BB;</span>
              <span class="text-sm text-gray-400">Sending handshake&hellip;</span>
            </div>
          </template>

          <!-- Failed: error + retry -->
          <template x-if="linkState === 'failed'">
            <div class="space-y-2">
              <div class="text-sm text-red-400" x-text="linkError"></div>
              <button @click="resetLink()"
                      class="w-full min-h-[44px] bg-amber-700 hover:bg-amber-600 text-white rounded-lg text-sm font-medium">
                Try Again
              </button>
            </div>
          </template>

        </div>
      </template>

    </div>
  </template>

</div>
