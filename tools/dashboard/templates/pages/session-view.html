<div x-data="sessionViewerPage()" class="session-viewer">

  <!-- Loading -->
  <template x-if="state === 'loading'">
    <div class="sv-loading">
      <template x-if="loadProgress > 0">
        <span>
          Loading session...
          <span x-text="loadedMB + ' / ' + totalMB + ' MB'"></span>
          <span x-text="'(' + loadProgress + '%)'"></span>
        </span>
      </template>
      <template x-if="loadProgress === 0">
        <span>Connecting to session...</span>
      </template>
    </div>
  </template>

  <!-- Error -->
  <template x-if="state === 'error'">
    <div class="sv-error" x-text="errorMsg"></div>
  </template>

  <!-- Main viewer -->
  <template x-if="state === 'ready'">
    <div class="sv-ready">

      <!-- Row 1: Header — 2 rows, translucent, collapsible -->
      <div class="sv-header" data-testid="session-header"
           :class="{ 'open': headerOpen }"
           @click="headerOpen = !headerOpen">
        <div class="sv-header-inner">
          <!-- Header row 1: status dot, role badge, indicator rail, terminal toggle, chevron -->
          <div class="sv-header-row1" style="display:flex;align-items:center;gap:12px;">
            <span class="indicator-dot"
                  :class="{ 'indicator--green': isLive, 'indicator--gray': !isLive, 'indicator-dot--working': isWorking }"></span>
            <span class="sc-role sc-type-host"
                  x-show="sessionType === 'host'"
                  x-text="'HOST'"
                  data-testid="session-type"></span>
            <span class="sc-role"
                  x-show="role"
                  x-text="role ? role.charAt(0).toUpperCase() + role.slice(1) : ''"
                  data-testid="session-role"></span>
            <div style="flex:1"></div>
            <template x-if="!isLive">
              <span class="text-xs text-gray-500" x-text="entries.length + ' entries'"></span>
            </template>
            <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                 style="transition:transform 0.25s ease;color:#6b7280;flex-shrink:0;"
                 :style="headerOpen ? 'transform:rotate(180deg);color:#6b7280' : 'color:#6b7280'">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
          <!-- Header row 2: title, tokens.
               Title is intentionally static (non-contenteditable): a second
               focusable element on the page causes iOS to show its form-nav
               accessory bar when the composer is focused. Label editing lives
               in the expanded panel below (src 634a761d-063 turns 115-117). -->
          <div class="sv-header-row2" style="display:flex;align-items:center;gap:6px;padding-top:2px;">
            <template x-if="_tmuxSession && isLive">
              <span class="session-title"
                    style="font-size:14px;font-weight:500;color:#e5e7eb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1;"
                    x-text="_label || _tmuxSession"></span>
            </template>
            <template x-if="_tmuxSession && !isLive">
              <span class="session-title"
                    style="font-size:14px;font-weight:500;color:#e5e7eb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1;"
                    x-text="_label || _tmuxSession"></span>
            </template>
            <template x-if="!_tmuxSession">
              <span class="session-title"
                    style="font-size:14px;font-weight:500;color:#9ca3af;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1;"
                    x-text="sessionId.slice(0, 12)"></span>
            </template>
            <span class="tokens" x-show="contextTokens > 0"
                  style="font-size:11px;font-variant-numeric:tabular-nums;color:#6b7280;"
                  x-text="Math.round(contextTokens / 1000) + 'k'"></span>
          </div>

        </div>

        <!-- Expanded header: topics section + stats grid.
             Sibling of .sv-header-inner so safe-area padding is not doubled.
             Visibility driven by CSS (.sv-header.open max-height animation). -->
        <div class="sv-header-expanded" @click.stop>

          <template x-if="topics && topics.length > 0">
            <div class="sv-exp-section">
              <div class="sv-exp-heading">TOPICS</div>
              <div class="sv-exp-topics">
                <template x-for="(topic, idx) in topics" :key="idx">
                  <span class="sv-exp-topic-item" x-text="topic"></span>
                </template>
              </div>
            </div>
          </template>

          <div class="sv-exp-section">
            <div class="sv-exp-stats-grid">
              <div class="sv-exp-stat-cell">
                <div class="sv-exp-stat-key">TURNS</div>
                <div class="sv-exp-stat-val" x-text="window.SessionStats.turnsStr({entryCount: entryCount}) || '—'"></div>
              </div>
              <div class="sv-exp-stat-cell">
                <div class="sv-exp-stat-key">CTX</div>
                <div class="sv-exp-stat-val"
                     :class="window.SessionStats.ctxWarn({contextTokens: contextTokens}) ? 'warn' : ''"
                     x-text="window.SessionStats.ctxStr({contextTokens: contextTokens}) || '—'"></div>
              </div>
              <div class="sv-exp-stat-cell">
                <div class="sv-exp-stat-key">IDLE</div>
                <div class="sv-exp-stat-val"
                     :class="'recent-' + window.SessionStats.recencyColor({lastActivity: lastActivity})"
                     x-text="window.SessionStats.idleStr({lastActivity: lastActivity}) || '—'"></div>
              </div>
              <template x-if="_tmuxSession">
                <div class="sv-exp-stat-cell sv-exp-stat-wide">
                  <div class="sv-exp-stat-key">TMUX</div>
                  <div class="sv-exp-stat-val" x-text="_tmuxSession"></div>
                </div>
              </template>
              <template x-if="org">
                <div class="sv-exp-stat-cell">
                  <div class="sv-exp-stat-key">ORG</div>
                  <div class="sv-exp-stat-val" style="display:flex; align-items:center; gap:6px;">
                    <span class="sc-org"
                          :style="org.favicon ? '' : `background:${org.color}`"
                          :title="org.resolved ? org.name : ('legacy: ' + (project || 'unknown'))">
                      <span class="sc-org-initial" x-text="org.initial" x-show="!org.favicon"></span>
                      <img class="sc-org-img" :src="org.favicon" x-show="org.favicon" :alt="org.name">
                    </span>
                    <span x-text="org.resolved ? org.name : '?'"></span>
                  </div>
                </div>
              </template>
            </div>
          </div>

        </div>

      </div>

      <!-- Row 2: Scrollable entries (tap to dismiss keyboard) -->
      <div class="sv-entries" x-ref="entriesContainer"
           @scroll="onScroll()"
           onclick="var el = document.querySelector('.sv-editable'); if (el) el.blur()">

        <!-- Empty state for new sessions with no entries yet -->
        <template x-if="entries.length === 0">
          <div style="display: flex; align-items: center; justify-content: center; height: 100%;">
            <div class="text-center text-gray-500">
              <div class="text-sm">Session started</div>
              <div class="text-xs mt-1 text-gray-600">Send a message to begin</div>
            </div>
          </div>
        </template>

        {% include "partials/session-entries.html" %}
      </div>

      <!-- Row 3: Input bar (contenteditable, shown when linked to tmux) -->
      <template x-if="isLive && _tmuxSession && (sessionType !== 'host' || _linked)">
        <div class="sv-input"
             @dragenter.prevent="$el.classList.add('drop-highlight')"
             @dragover.prevent="$el.classList.add('drop-highlight')"
             @dragleave.prevent="$el.classList.remove('drop-highlight')"
             @drop.prevent="$el.classList.remove('drop-highlight'); addFiles($event.dataTransfer.files)">

          <!-- Attachment preview strip -->
          <div class="sv-attach-strip" x-show="attachments.length > 0">
            <template x-for="att in attachments" :key="att.id">
              <div class="thumb-wrap">
                <template x-if="att.isImage && att.dataUrl">
                  <img :src="att.dataUrl">
                </template>
                <template x-if="!att.isImage || !att.dataUrl">
                  <div class="thumb-file">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                      <polyline points="14 2 14 8 20 8"/>
                    </svg>
                    <span x-text="att.name"></span>
                  </div>
                </template>
                <button class="thumb-x" @click="removeAttachment(att.id)">&times;</button>
              </div>
            </template>
          </div>

          <div class="sv-input-row">
            <!-- Hidden file input -->
            <input type="file"
                   x-ref="fileInput"
                   accept="image/*,*/*"
                   multiple
                   style="display:none"
                   @change="addFiles($event.target.files); $event.target.value=''">

            <!-- Attach button (plus, matches input-prototype) -->
            <button class="sv-attach"
                    @click="$refs.fileInput.click()"
                    :disabled="uploading"
                    title="Attach file">
              <template x-if="!uploading">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
              </template>
              <template x-if="uploading">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="animate-spin"><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg>
              </template>
            </button>

            <!-- Contenteditable message input + send button (iMessage-style bubble) -->
            <div class="sv-input-bubble">
              <div class="sv-editable"
                   x-ref="messageInput"
                   contenteditable="true"
                   data-placeholder="Message..."
                   role="textbox"
                   aria-multiline="true"
                   oninput="Alpine.$data(this.closest('[x-data]')).onInput(this)"
                   onkeydown="if((event.metaKey||event.ctrlKey)&&event.key==='Enter'){event.preventDefault();Alpine.$data(this.closest('[x-data]')).sendMessage()}"
                   onpaste="var e=event; e.preventDefault(); document.execCommand('insertText', false, (e.clipboardData||window.clipboardData).getData('text/plain'));"></div>
              <button class="sv-send"
                      id="sendBtn"
                      ontouchend="event.preventDefault(); Alpine.$data(this.closest('[x-data]')).sendMessage()"
                      @click="sendMessage()"
                      onmousedown="event.preventDefault()"
                      :disabled="(attachments.length === 0 && !hasContent) || sending">
                <template x-if="!sending">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94l18.04-8.5a.75.75 0 000-1.38l-18.04-8.5z"/></svg>
                </template>
                <template x-if="sending">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="animate-spin"><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg>
                </template>
              </button>
            </div>
          </div>
        </div>
      </template>

      <!-- Row 3 alt: Link Terminal (when host session not yet linked) -->
      <template x-if="isLive && !_linked && sessionType === 'host'">
        <div class="sv-input">
          <div class="sv-input-row" style="padding:10px 0.5rem;">

            <!-- Idle: show Link Terminal button -->
            <template x-if="linkState === 'idle'">
              <button @click="showLinkPicker()"
                      class="w-full min-h-[44px] bg-amber-700 hover:bg-amber-600 text-white rounded-lg text-sm font-medium">
                Link Terminal
              </button>
            </template>

            <!-- Picking: show candidate list -->
            <template x-if="linkState === 'picking'">
              <div class="space-y-2" style="width:100%;">
                <div class="text-xs text-gray-400 font-medium">Select a tmux session to link:</div>

                <template x-if="linkCandidates.length === 0">
                  <div class="text-xs text-gray-500 py-2">No unclaimed terminals available</div>
                </template>

                <template x-for="(c, ci) in linkCandidates" :key="c.tmux_session">
                  <label class="flex items-center gap-2 p-2 rounded cursor-pointer hover:bg-gray-700"
                         :class="selectedTmux === c.tmux_session ? 'bg-gray-700 ring-1 ring-amber-500' : ''">
                    <input type="radio" name="link-tmux" :value="c.tmux_session"
                           x-model="selectedTmux" class="accent-amber-500">
                    <span class="text-sm text-gray-200 font-mono" x-text="c.tmux_session"></span>
                    <span class="text-xs text-gray-500" x-text="Math.floor(c.elapsed_seconds / 60) + 'm ago'"></span>
                    <span class="text-xs text-gray-600 truncate max-w-[200px]" x-text="c.cmd"></span>
                  </label>
                </template>

                <div class="flex gap-2">
                  <button @click="resetLink()"
                          class="flex-1 min-h-[44px] bg-gray-700 hover:bg-gray-600 text-gray-300 rounded-lg text-sm">
                    Cancel
                  </button>
                  <button @click="confirmLink()"
                          :disabled="!selectedTmux"
                          class="flex-1 min-h-[44px] bg-amber-700 hover:bg-amber-600 text-white rounded-lg text-sm font-medium
                                 disabled:opacity-50 disabled:cursor-not-allowed">
                    Confirm Link
                  </button>
                </div>
              </div>
            </template>

            <!-- Handshaking: spinner -->
            <template x-if="linkState === 'handshaking'">
              <div class="flex items-center justify-center gap-2 py-3" style="width:100%;">
                <span class="animate-spin text-amber-400">&#x21BB;</span>
                <span class="text-sm text-gray-400">Sending handshake&hellip;</span>
              </div>
            </template>

            <!-- Failed: error + retry -->
            <template x-if="linkState === 'failed'">
              <div class="space-y-2" style="width:100%;">
                <div class="text-sm text-red-400" x-text="linkError"></div>
                <button @click="resetLink()"
                        class="w-full min-h-[44px] bg-amber-700 hover:bg-amber-600 text-white rounded-lg text-sm font-medium">
                  Try Again
                </button>
              </div>
            </template>

          </div>
        </div>
      </template>

    </div>
  </template>

</div>
