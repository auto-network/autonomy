<div x-data="sourcePage()" class="pb-safe">

  <!-- Loading -->
  <template x-if="state === 'loading'">
    <div class="text-gray-500 text-sm">Loading source...</div>
  </template>

  <!-- Error -->
  <template x-if="state === 'error'">
    <div class="text-red-400" x-text="errorMsg"></div>
  </template>

  <!-- Attachment view -->
  <template x-if="state === 'ready' && isAttachment">
    <div>
      <section aria-label="Attachment Header" class="mb-6">
        <div class="flex items-center gap-3 mb-2">
          <span class="px-2 py-0.5 rounded text-xs font-semibold bg-cyan-700">attachment</span>
          <span class="text-xs text-gray-500" x-text="(attData.created_at || '').slice(0, 10)"></span>
          <button class="text-xs text-gray-600 font-mono ml-auto hover:text-gray-400 active:text-emerald-400 transition-colors duration-150 cursor-pointer bg-transparent border-none p-0"
                @click="
                  navigator.clipboard.writeText('graph://' + (attData.id || '').slice(0, 12));
                  $el.textContent = 'copied!';
                  $el.classList.add('text-emerald-400');
                  setTimeout(() => {
                    $el.textContent = (attData.id || '').slice(0, 12);
                    $el.classList.remove('text-emerald-400');
                  }, 1000);
                "
                x-text="(attData.id || '').slice(0, 12)"></button>
        </div>
        <h1 class="text-xl font-bold" x-text="attData.filename || 'Untitled'"></h1>
      </section>

      <!-- Image preview -->
      <template x-if="attData.mime_type && attData.mime_type.startsWith('image/')">
        <div class="mb-4">
          <img :src="attData.url" :alt="attData.filename" class="max-w-full rounded border border-gray-700">
        </div>
      </template>

      <!-- Text / JSON preview -->
      <template x-if="attData.mime_type && (attData.mime_type.startsWith('text/') || attData.mime_type === 'application/json')">
        <div class="mb-4" x-data="{ textContent: '', loaded: false }" x-init="
          fetch(attData.url).then(r => r.text()).then(t => { textContent = t; loaded = true; })
        ">
          <template x-if="loaded">
            <pre class="p-4 bg-gray-900 rounded border border-gray-700 text-sm text-gray-300 overflow-x-auto max-h-[80vh] overflow-y-auto whitespace-pre-wrap"><code x-text="textContent"></code></pre>
          </template>
          <template x-if="!loaded">
            <div class="text-gray-500 text-sm">Loading content...</div>
          </template>
        </div>
      </template>

      <!-- PDF preview -->
      <template x-if="attData.mime_type === 'application/pdf'">
        <div class="mb-4">
          <iframe :src="attData.url" class="w-full rounded border border-gray-700" style="height: 80vh;"></iframe>
        </div>
      </template>

      <!-- Metadata -->
      <div class="p-4 bg-gray-800 rounded-lg border border-gray-700 space-y-2 text-sm">
        <div class="flex gap-2">
          <span class="text-gray-500 w-20">Filename</span>
          <span class="text-gray-300" x-text="attData.filename"></span>
        </div>
        <div class="flex gap-2">
          <span class="text-gray-500 w-20">MIME type</span>
          <span class="text-gray-300" x-text="attData.mime_type"></span>
        </div>
        <div class="flex gap-2">
          <span class="text-gray-500 w-20">Size</span>
          <span class="text-gray-300"
                x-text="attData.size_bytes > 1024*1024
                  ? (attData.size_bytes / 1024 / 1024).toFixed(1) + ' MB'
                  : (attData.size_bytes / 1024).toFixed(1) + ' KB'"></span>
        </div>
        <div class="flex gap-2">
          <span class="text-gray-500 w-20">Created</span>
          <span class="text-gray-300" x-text="(attData.created_at || '').slice(0, 16)"></span>
        </div>
        <template x-if="attData.turn">
          <div class="flex gap-2">
            <span class="text-gray-500 w-20">Turn</span>
            <span class="text-gray-300" x-text="'t' + attData.turn"></span>
          </div>
        </template>
        <template x-if="attData.source_id">
          <div class="flex gap-2">
            <span class="text-gray-500 w-20">Source</span>
            <a :href="'/graph/' + attData.source_id"
               @click.prevent="navigateTo('/graph/' + attData.source_id)"
               class="text-indigo-400 hover:underline"
               x-text="attData.source_id.slice(0, 12) + ' →'"></a>
          </div>
        </template>
      </div>

      <!-- Download button (programmatic, no navigation) -->
      <div class="mt-4">
        <button @click="
          fetch(attData.url)
            .then(r => r.blob())
            .then(blob => {
              const a = document.createElement('a');
              a.href = URL.createObjectURL(blob);
              a.download = attData.filename || 'download';
              a.click();
              URL.revokeObjectURL(a.href);
            })
        " class="px-3 py-1 bg-gray-700 rounded text-sm hover:bg-gray-600 cursor-pointer">
          Download
        </button>
      </div>
    </div>
  </template>

  <!-- Source content -->
  <template x-if="state === 'ready' && !isAttachment">
    <div>

      <!-- Header -->
      <section aria-label="Source Header" class="mb-6">
        <div class="flex items-center gap-3 mb-2">
          <span class="px-2 py-0.5 rounded text-xs font-semibold"
                :class="badgeCls"
                x-text="srcType"></span>
          <template x-if="src.project">
            <span class="text-xs text-indigo-400" x-text="'[' + src.project + ']'"></span>
          </template>
          <span class="text-xs text-gray-500" x-text="date"></span>
          <button class="text-xs text-gray-600 font-mono ml-auto hover:text-gray-400 active:text-emerald-400 transition-colors duration-150 cursor-pointer bg-transparent border-none p-0"
                @click="
                  navigator.clipboard.writeText('graph://' + (src.id || '').slice(0, 12));
                  $el.textContent = 'copied!';
                  $el.classList.add('text-emerald-400');
                  setTimeout(() => {
                    $el.textContent = (src.id || '').slice(0, 12);
                    $el.classList.remove('text-emerald-400');
                  }, 1000);
                "
                x-text="(src.id || '').slice(0, 12)"></button>
        </div>
        <h1 class="font-bold"
            :class="isContext ? 'text-lg' : 'text-xl'"
            x-show="!isNote"
            x-text="src.title || 'Untitled'"></h1>

        <!-- Context mode sub-header -->
        <template x-if="isContext">
          <div class="text-xs text-gray-500 mt-1">
            Showing turns
            <span x-text="(targetTurn - contextWindow) + '–' + (targetTurn + contextWindow)"></span>
            of
            <span x-text="allEntries.length"></span>
            <a :href="'/graph/' + id"
               class="text-indigo-400 ml-2 hover:underline">View full source →</a>
          </div>
        </template>
      </section>

      <!-- Note metadata bar -->
      <template x-if="isNote && noteMeta">
        <div class="flex items-center gap-3 mt-2 mb-4 text-sm flex-wrap">
          <span class="font-mono text-gray-400" x-text="src.id.slice(0, 12) + '@v' + noteVersionCount"></span>
          <span class="text-gray-500" x-text="src.created_at.slice(0, 16)"></span>
          <template x-if="noteMeta.author">
            <span class="text-gray-400" x-text="noteMeta.author"></span>
          </template>
          <template x-if="noteProvenanceId">
            <a :href="'/' + (noteProvenanceType === 'bead' ? 'bead' : 'graph') + '/' + noteProvenanceId"
               class="text-indigo-400 hover:underline text-xs">provenance →</a>
          </template>
          <template x-for="tag in (noteMeta.tags || [])" :key="tag">
            <span class="px-1.5 py-0.5 bg-gray-700 text-gray-400 text-xs rounded" x-text="tag"></span>
          </template>
        </div>
      </template>

      <!-- Note layout -->
      <template x-if="isNote">
        <div :data-source-id="src.id">
          <div x-markdown="noteContent"></div>
        </div>
      </template>

      <!-- Non-referenced attachments (download list) -->
      <template x-if="isNote && unrefAttachments.length > 0">
        <div class="mt-4 p-3 bg-gray-800/50 rounded border border-gray-700">
          <div class="text-xs font-semibold text-gray-500 mb-2">Attachments</div>
          <template x-for="att in unrefAttachments" :key="att.id">
            <a :href="'/graph/' + att.id.slice(0, 12)"
               @click.prevent="navigateTo('/graph/' + att.id.slice(0, 12))"
               class="flex items-center gap-2 text-sm text-indigo-400 hover:text-indigo-300 py-1">
              <span class="text-gray-500">&#128206;</span>
              <span x-text="att.filename"></span>
              <span class="text-xs text-gray-500"
                    x-text="att.size_bytes > 1024*1024
                      ? (att.size_bytes / 1024 / 1024).toFixed(1) + 'MB'
                      : (att.size_bytes / 1024).toFixed(0) + 'KB'"></span>
            </a>
          </template>
        </div>
      </template>

      <!-- Note comments -->
      <template x-if="isNote && noteComments.length > 0">
        <section aria-label="Comments" class="mt-8">
          <h3 class="text-sm font-semibold text-gray-400 mb-3"
              x-text="'Comments (' + noteComments.length + ')'"></h3>
          <div class="space-y-3">
            <template x-for="c in noteComments" :key="c._key">
              <div class="pl-4 border-l-2 border-indigo-700/50">
                <div class="text-xs text-gray-500 mb-1" x-text="c.actor + ' · ' + c.created_at.slice(0, 16)"></div>
                <div class="text-sm text-gray-300" x-markdown="c.content"></div>
              </div>
            </template>
          </div>
        </section>
      </template>

      <!-- Chat layout (session / conversation / agent-run) -->
      <template x-if="isChat">
        <div class="space-y-4">
          <template x-for="e in visibleEntries" :key="e._key">
            <div class="p-4 bg-gray-800 rounded-lg border-l-4"
                 :class="{
                   'border-blue-500 mr-16': e.entry_type === 'thought',
                   'border-gray-600 ml-16': e.entry_type !== 'thought',
                   'ring-2 ring-indigo-500': isHighlighted(e.turn_number)
                 }"
                 :id="'turn-' + e.turn_number"
                 :data-source-id="src.id">
              <div class="flex items-center gap-2 mb-2">
                <span class="text-xs font-semibold"
                      :class="e.entry_type === 'thought' ? 'text-blue-400' : 'text-gray-400'"
                      x-text="e.entry_type === 'thought' ? 'USER' : 'ASSISTANT'"></span>
                <span class="text-xs text-gray-600" x-text="'t' + e.turn_number"></span>
              </div>
              <div class="text-sm" x-markdown="e.content || ''"></div>
            </div>
          </template>
        </div>
      </template>

      <!-- Doc layout (docs / status / musings / etc.) -->
      <template x-if="isDoc">
        <div class="space-y-4">
          <template x-for="e in visibleEntries" :key="e._key">
            <div class="text-sm" x-markdown="e.content || ''"></div>
          </template>
        </div>
      </template>

      <!-- Context expand buttons -->
      <template x-if="isContext">
        <div class="flex gap-4 mt-4 justify-center">
          <button @click="showMoreContext()"
                  class="px-3 py-1 bg-gray-700 rounded text-sm hover:bg-gray-600">Show more context</button>
          <a :href="'/graph/' + id"
             class="px-3 py-1 bg-gray-700 rounded text-sm hover:bg-gray-600 inline-block">Full source</a>
        </div>
      </template>

      <!-- Edges sidebar -->
      <template x-if="edges.length > 0">
        <section aria-label="Connections" class="mt-8 p-4 bg-gray-800 rounded-lg border border-gray-700">
          <h3 class="text-sm font-semibold text-gray-400 mb-3"
              x-text="'Connections (' + edges.length + ')'"></h3>
          <div class="space-y-1">
            <template x-for="e in edges" :key="e._key">
              <a :href="edgeHref(e)"
                 :data-source-id="edgeTarget(e)"
                 class="block text-xs text-gray-400 hover:text-gray-200 no-underline">
                <span class="text-indigo-400" x-text="e.relation || '?'"></span>
                →
                <span x-text="edgeTarget(e).slice(0, 12)"></span>
                [<span x-text="edgeTargetType(e)"></span>]<span x-text="edgeMeta(e)"></span>
              </a>
            </template>
          </div>
        </section>
      </template>

    </div>
  </template>

</div>
