<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Autonomy Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-clipboard@0/lib/addon-clipboard.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.min.css">
  <style>
    .markdown-body h1 { font-size: 1.5rem; font-weight: 700; margin: 1rem 0 0.5rem; }
    .markdown-body h2 { font-size: 1.25rem; font-weight: 600; margin: 1rem 0 0.5rem; border-bottom: 1px solid #374151; padding-bottom: 0.25rem; }
    .markdown-body h3 { font-size: 1.1rem; font-weight: 600; margin: 0.75rem 0 0.25rem; }
    .markdown-body p { margin: 0.5rem 0; }
    .markdown-body ul, .markdown-body ol { margin: 0.5rem 0; padding-left: 1.5rem; }
    .markdown-body li { margin: 0.25rem 0; }
    .markdown-body code { background: #1f2937; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-size: 0.875rem; }
    .markdown-body pre { background: #1f2937; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.5rem 0; }
    .markdown-body pre code { background: none; padding: 0; }
    .markdown-body table { border-collapse: collapse; margin: 0.5rem 0; width: 100%; }
    .markdown-body th, .markdown-body td { border: 1px solid #374151; padding: 0.375rem 0.75rem; text-align: left; }
    .markdown-body th { background: #1f2937; font-weight: 600; }
    .markdown-body blockquote { border-left: 3px solid #6366f1; padding-left: 1rem; margin: 0.5rem 0; color: #9ca3af; }
    .markdown-body strong { color: #e5e7eb; }
    .markdown-body a { color: #818cf8; text-decoration: underline; }
    .nav-link { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0.75rem; border-radius: 0.375rem; color: #9ca3af; text-decoration: none; }
    .nav-link:hover { background: #374151; color: #e5e7eb; }
    .nav-link.active { background: #4f46e5; color: white; }
    .nav-badge { display: inline-flex; align-items: center; justify-content: center; font-size: 0.6875rem; font-weight: 600; line-height: 1; min-width: 1.25rem; padding: 0.125rem 0.375rem; border-radius: 9999px; }
    .nav-badge:empty { display: none; }
    .nav-badge-indigo { background: #4f46e5; color: white; }
    .nav-badge-green { background: #16a34a; color: white; }
    .nav-badge-amber { background: #d97706; color: white; }
    .nav-badge-gray { background: #4b5563; color: #d1d5db; }
    .dispatch-badges { display: flex; gap: 0.25rem; }
    .badge { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
    .badge-p0 { background: #dc2626; color: white; }
    .badge-p1 { background: #f59e0b; color: black; }
    .badge-p2 { background: #3b82f6; color: white; }
    .badge-p3 { background: #6b7280; color: white; }
    .badge-open { background: #22c55e; color: black; }
    .badge-closed { background: #6b7280; color: white; }
    .badge-blocked { background: #ef4444; color: white; }
    .badge-in_progress { background: #a855f7; color: white; }
    /* Board view — independent column scrolling */
    .board-container { min-height: 0; }
    .board-column { max-height: calc(100vh - 16rem); }
    .board-column-scroll { scrollbar-width: thin; scrollbar-color: #4b5563 transparent; }
    .board-column-scroll::-webkit-scrollbar { width: 4px; }
    .board-column-scroll::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 2px; }
    @media (max-width: 639px) {
      .bead-tile { min-height: 3.5rem; }
      .board-container { flex-direction: column !important; }
      .board-column { min-width: 0 !important; max-height: none; }
      .board-column-scroll { max-height: 50vh; }
    }
    /* Dense Table View */
    .bead-table { border-collapse: collapse; font-size: 0.8125rem; }
    .bead-th {
      text-align: left; padding: 0.375rem 0.5rem; font-weight: 600; font-size: 0.75rem;
      color: #9ca3af; border-bottom: 2px solid #374151; cursor: pointer; user-select: none;
      white-space: nowrap; position: sticky; top: 0; background: #111827; z-index: 1;
    }
    .bead-th:hover { color: #e5e7eb; }
    .bead-th-cb { width: 2.5rem; cursor: default; }
    .bead-th-title { min-width: 200px; }
    .bead-th-id { width: 80px; }
    .bead-th-priority { width: 48px; }
    .bead-th-phase { width: 80px; }
    .bead-th-type { width: 64px; }
    .bead-th-epic { width: 120px; }
    .bead-th-labels { min-width: 100px; }
    .bead-th-updated_at { width: 120px; }
    .bead-td { padding: 0.25rem 0.5rem; border-bottom: 1px solid #1f2937; vertical-align: middle; }
    .bead-td-cb { width: 2.5rem; }
    .bead-td-title { font-size: 0.8125rem; max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bead-tr-even { background: #111827; }
    .bead-tr-odd { background: #0d1117; }
    .bulk-action-bar {
      display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0.75rem;
      background: #1e1b4b; border: 1px solid #4f46e5; border-radius: 0.5rem;
      margin-bottom: 0.75rem;
    }
    /* Tree View */
    .tree-group > summary { list-style: none; }
    .tree-group > summary::-webkit-details-marker { display: none; }
    .tree-group[open] > summary .tree-chevron { transform: rotate(90deg); }
    .tree-node:hover { background: #1f2937; }
    /* DAG View */
    .dag-viewport { scrollbar-width: thin; scrollbar-color: #4b5563 transparent; }
    .dag-viewport::-webkit-scrollbar { width: 6px; height: 6px; }
    .dag-viewport::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
    .dag-node-critical { box-shadow: 0 0 8px rgba(239, 68, 68, 0.3); }
    .dag-canvas { transition: transform 0.15s ease-out; }
    /* Live Panel */
    #live-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: #111827; border-top: 2px solid #4f46e5;
      transition: transform 0.3s ease;
      display: flex; flex-direction: column;
    }
    #live-panel.collapsed { transform: translateY(calc(100% - 2.5rem)); }
    #live-panel-header {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.375rem 1rem; background: #1e1b4b; cursor: pointer;
      min-height: 2.5rem; flex-shrink: 0;
    }
    #live-panel-body {
      overflow-y: auto; max-height: 50vh; padding: 0.75rem 1rem;
      scroll-behavior: smooth;
    }
    #live-panel.collapsed #live-panel-body { display: none; }
    .live-entry { margin-bottom: 0.75rem; }
    .live-entry-user { border-left: 3px solid #3b82f6; padding-left: 0.75rem; }
    .live-entry-assistant { border-left: 3px solid #6366f1; padding-left: 0.75rem; }
    .live-entry-tool { border-left: 3px solid #8b5cf6; padding-left: 0.75rem; }
    .live-entry-thinking { border-left: 3px solid #374151; padding-left: 0.75rem; opacity: 0.6; }
    .live-entry-time { font-size: 0.625rem; color: #6b7280; }
    .live-tool-toggle { cursor: pointer; user-select: none; }
    .live-tool-toggle::before { content: '▶ '; font-size: 0.625rem; }
    .live-tool-toggle[open]::before { content: '▼ '; }
    .live-resume-btn {
      position: sticky; bottom: 0.5rem; align-self: center;
      padding: 0.25rem 1rem; background: #4f46e5; color: white;
      border-radius: 9999px; font-size: 0.75rem; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4); display: none;
    }
    .live-pulse { width: 0.5rem; height: 0.5rem; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex">
  <!-- Mobile nav toggle -->
  <button id="nav-toggle" onclick="document.getElementById('sidebar').classList.toggle('-translate-x-full')"
          class="md:hidden fixed top-3 left-3 z-50 bg-gray-800 p-2 rounded-lg border border-gray-700">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
  </button>

  <!-- Sidebar overlay (mobile) -->
  <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/50 z-30 md:hidden"
       onclick="document.getElementById('sidebar').classList.add('-translate-x-full'); this.classList.add('hidden')"></div>

  <!-- Sidebar -->
  <nav id="sidebar" class="w-56 bg-gray-800 p-4 flex flex-col flex-shrink-0 border-r border-gray-700
                            fixed md:static inset-y-0 left-0 z-40
                            transform -translate-x-full md:translate-x-0
                            transition-transform duration-200 ease-in-out">
    <h1 class="text-lg font-bold text-indigo-400 mb-4">Autonomy</h1>
    <div class="space-y-1 mb-6">
      <a href="/beads" class="nav-link" data-page="beads" onclick="closeSidebar()">Beads <span id="badge-beads" class="nav-badge nav-badge-indigo"></span></a>
      <a href="/dispatch" class="nav-link" data-page="dispatch" onclick="closeSidebar()">Dispatch <span class="dispatch-badges" id="badge-dispatch"></span></a>
      <a href="/sessions" class="nav-link" data-page="sessions" onclick="closeSidebar()">Sessions <span id="badge-sessions" class="nav-badge nav-badge-green"></span></a>
      <a href="/timeline" class="nav-link" data-page="timeline" onclick="closeSidebar()">Timeline <span id="badge-timeline" class="nav-badge nav-badge-green"></span></a>
      <a href="/search" class="nav-link" data-page="search" onclick="closeSidebar()">Search</a>
      <a href="/terminal" class="nav-link" data-page="terminal" onclick="closeSidebar()">Terminal <span id="badge-terminal" class="nav-badge nav-badge-gray"></span></a>
    </div>
    <div class="mt-auto text-xs text-gray-500" id="stats-summary">loading...</div>
  </nav>

  <script>
    function closeSidebar() {
      if (window.innerWidth < 768) {
        document.getElementById('sidebar').classList.add('-translate-x-full');
        document.getElementById('sidebar-overlay').classList.add('hidden');
      }
    }
    // Show overlay when sidebar opens on mobile
    const sidebar = document.getElementById('sidebar');
    const observer = new MutationObserver(() => {
      const overlay = document.getElementById('sidebar-overlay');
      if (!sidebar.classList.contains('-translate-x-full') && window.innerWidth < 768) {
        overlay.classList.remove('hidden');
      } else {
        overlay.classList.add('hidden');
      }
    });
    observer.observe(sidebar, { attributes: true, attributeFilter: ['class'] });
  </script>

  <!-- Main -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700 px-4 md:px-6 py-3 flex items-center gap-3 md:gap-4">
      <div class="w-8 md:hidden"></div><!-- spacer for hamburger -->
      <input type="text" id="global-search" placeholder="Search graph..."
             class="bg-gray-700 text-gray-100 px-3 md:px-4 py-2 rounded-lg flex-1 max-w-xl text-sm
                    focus:outline-none focus:ring-2 focus:ring-indigo-500">
      <span class="text-sm text-gray-400 hidden md:inline" id="page-title"></span>
    </header>

    <!-- Content -->
    <main class="flex-1 overflow-auto p-6" id="content">
      <div class="text-gray-400">Loading...</div>
    </main>
  </div>

  <!-- Live Session Panel (bottom-docked overlay) -->
  <div id="live-panel" class="collapsed" style="display:none;">
    <div id="live-panel-header" onclick="toggleLivePanel()">
      <div class="live-pulse" id="live-pulse"></div>
      <span class="text-sm font-semibold text-indigo-300" id="live-panel-title">Session</span>
      <span id="live-panel-badge" class="badge badge-open" style="font-size: 0.625rem; padding: 0.0625rem 0.375rem;">Live</span>
      <span class="text-xs text-gray-500 font-mono" id="live-panel-bead"></span>
      <span class="text-xs text-gray-500 ml-auto" id="live-panel-status"></span>
      <button onclick="event.stopPropagation(); hideLivePanel();" class="text-gray-500 hover:text-gray-300 text-sm px-1">✕</button>
    </div>
    <div id="live-panel-body">
      <div id="live-panel-entries"></div>
      <button id="live-resume-btn" class="live-resume-btn" onclick="liveResumeScroll()">↓ Resume auto-scroll</button>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
