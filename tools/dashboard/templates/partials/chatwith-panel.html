{# Chat With panel — rich message feed + multimodal input bar.
   Uses session store + SSE for live updates (no polling).
   Include inside a parent x-data scope that initializes chatWithPanel(). #}

<!-- Scrollable entries -->
<div class="flex-1 overflow-y-auto px-2 py-3" x-ref="cwEntriesContainer"
     @scroll="onScroll()">

  <!-- Waiting state — shown while session data hasn't arrived yet -->
  <template x-if="state === 'waiting' && entries.length === 0">
    <div class="text-gray-500 text-xs text-center py-4">Connecting to session...</div>
  </template>

  <template x-for="(entry, idx) in displayEntries" :key="idx">
    <div>

      <!-- ── Grouped tool calls (combined card) ────────── -->
      <template x-if="entry.type === 'tool_group'">
        <div class="sc-entry"
             :class="[borderClass(entry), hasGap(idx) ? 'sc-gap' : '']">
          <div>
            <!-- Header: chip + count + aggregated meta + timestamp -->
            <div class="sc-line1">
              <span class="sc-chip" :class="chipClass(entry.tool_name)" x-text="entry.tool_name"></span>
              <span class="sc-meta sc-meta-gray" x-text="'\u00d7' + entry.items.length"></span>
              <template x-for="badge in groupMeta(entry)" :key="badge.text">
                <span class="sc-meta" :class="badge.cls" x-text="badge.text"></span>
              </template>
              <span class="sc-timestamp" x-text="formatTime(entry.timestamp)"></span>
            </div>
            <!-- Per-invocation lines -->
            <template x-for="(item, subIdx) in entry.items" :key="subIdx">
              <div>
                <div class="sc-group-item" @click="toggleGroupItem(idx, subIdx)">
                  <template x-if="entry.tool_name === 'Bash'">
                    <span class="sc-group-status" :style="bashStatusColor(item)" x-text="bashStatus(item)"></span>
                  </template>
                  <span class="sc-group-item-text" x-text="headline(item)"></span>
                </div>
                <!-- Expanded detail panel (accordion — one at a time) -->
                <template x-if="isGroupItemExpanded(idx, subIdx)">
                  <div @click.stop>
                    <div class="sc-detail-tabs" @click="toggleGroupItemView(idx, subIdx)">
                      <span class="sc-detail-tab"
                            :class="groupItemViewMode(idx, subIdx) === 'output' ? 'sc-detail-tab-active' : ''">Output</span>
                      <span class="sc-detail-tab"
                            :class="groupItemViewMode(idx, subIdx) === 'input' ? 'sc-detail-tab-active' : ''">Input</span>
                    </div>
                    <pre class="sc-detail" x-text="groupItemExpandContent(item, idx, subIdx)"></pre>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- ── Regular entries (skip tool_result) ────────── -->
      <template x-if="entry.type !== 'tool_result' && entry.type !== 'tool_group'">
        <div class="sc-entry"
             :class="[
               borderClass(entry),
               hasGap(idx) ? 'sc-gap' : '',
               entry.type === 'user' ? 'sc-entry-user' : '',
               entry.type === 'assistant_text' ? 'sc-entry-assistant' : '',
               entry.type === 'thinking' ? 'sc-entry-thinking' : '',
               entry.type === 'system' ? 'sc-entry-system' : '',
               entry.type === 'crosstalk' ? 'sc-entry-crosstalk' : '',
               entry.type === 'crosstalk' && entry.direction === 'sent' ? 'sc-entry-crosstalk-sent' : '',
             ]">

              <!-- ── User message ────────────────────────────── -->
              <template x-if="entry.type === 'user'">
                <div>
                  <div class="flex items-center gap-2 mb-1">
                    <span class="sc-user-label">USER</span>
                    <span class="sc-timestamp" x-text="formatTime(entry.timestamp)"></span>
                  </div>
                  <div class="sc-user-content" x-text="entry.content || ''"></div>
                </div>
              </template>

              <!-- ── Assistant text (markdown) ───────────────── -->
              <template x-if="entry.type === 'assistant_text'">
                <div>
                  <div class="flex items-center gap-2 mb-1">
                    <span class="sc-asst-label">ASSISTANT</span>
                    <span class="sc-timestamp" x-text="formatTime(entry.timestamp)"></span>
                  </div>
                  <div class="sc-asst-content" x-markdown="entry.content || ''"></div>
                </div>
              </template>

              <!-- ── Tool use: two-line chip card ────────────── -->
              <template x-if="entry.type === 'tool_use'">
                <div class="sc-tool-card" @click="toggleExpand(idx)">
                  <!-- Line 1: chip + meta + timestamp -->
                  <div class="sc-line1">
                    <span class="sc-chip" :class="chipClass(entry.tool_name)" x-text="entry.tool_name || '?'"></span>
                    <template x-for="badge in metaDisplay(entry)" :key="badge.text">
                      <span class="sc-meta" :class="badge.cls" x-text="badge.text"></span>
                    </template>
                    <span class="sc-timestamp" x-text="formatTime(entry.timestamp)"></span>
                  </div>
                  <!-- Line 2: headline -->
                  <div class="sc-line2"
                       :class="isExpanded(idx) ? 'sc-line2-expanded' : 'sc-line2-truncated'"
                       x-text="headline(entry)"></div>
                  <!-- Detail panel (expanded) -->
                  <template x-if="isExpanded(idx)">
                    <div @click.stop>
                      <div class="sc-detail-tabs" @click="toggleView(idx)">
                        <span class="sc-detail-tab"
                              :class="expandViewMode(idx) === 'output' ? 'sc-detail-tab-active' : ''">Output</span>
                        <span class="sc-detail-tab"
                              :class="expandViewMode(idx) === 'input' ? 'sc-detail-tab-active' : ''">Input</span>
                      </div>
                      <pre class="sc-detail" x-text="expandContent(entry, idx)"></pre>
                    </div>
                  </template>
                </div>
              </template>

              <!-- ── Thinking (collapsed by default) ─────────── -->
              <template x-if="entry.type === 'thinking'">
                <div class="sc-tool-card" @click="toggleExpand(idx)">
                  <div class="sc-line1">
                    <span class="sc-think-label">thinking...</span>
                    <span class="sc-timestamp" x-text="formatTime(entry.timestamp)"></span>
                  </div>
                  <template x-if="isExpanded(idx)">
                    <div class="sc-detail" style="font-style: italic;" x-text="entry.content || ''"></div>
                  </template>
                </div>
              </template>

              <!-- ── System / harness message ────────────────── -->
              <template x-if="entry.type === 'system'">
                <div class="sc-tool-card" @click="toggleExpand(idx)">
                  <div class="flex items-center gap-2">
                    <span class="sc-sys-icon" :style="sysIconColor(entry)" x-text="sysIcon(entry)"></span>
                    <span class="sc-sys-label" x-text="entry.content || ''"></span>
                    <span class="sc-timestamp" x-text="formatTime(entry.timestamp)"></span>
                  </div>
                  <template x-if="isExpanded(idx)">
                    <div class="sc-detail" x-text="entry.content || ''"></div>
                  </template>
                </div>
              </template>

              <!-- ── CrossTalk peer message ──────────────────── -->
              <template x-if="entry.type === 'crosstalk'">
                <div>
                  <div class="flex items-center gap-2 mb-1">
                    <span class="sc-ct-label" x-text="entry.direction === 'sent' ? 'SENT' : 'CROSSTALK'"></span>
                    <template x-if="entry.direction === 'sent'">
                      <span class="sc-ct-sender" x-text="'\u2192 ' + entry.target"></span>
                    </template>
                    <template x-if="entry.direction !== 'sent' && entry.source_id">
                      <a class="sc-ct-sender"
                         :href="'/graph/' + entry.source_id"
                         x-text="entry.sender_label || entry.sender"></a>
                    </template>
                    <template x-if="entry.direction !== 'sent' && !entry.source_id">
                      <span class="sc-ct-sender"
                            x-text="entry.sender_label || entry.sender"></span>
                    </template>
                    <span class="sc-timestamp" x-text="formatTime(entry.timestamp)"></span>
                  </div>
                  <div class="sc-ct-content" x-text="entry.content || ''"></div>
                  <div class="sc-ct-provenance" x-show="entry.source_id">
                    <a :href="'/graph/' + entry.source_id + '?turn=' + entry.turn">
                      <span x-text="'turn ' + entry.turn"></span>
                    </a>
                  </div>
                </div>
              </template>

              <!-- ── Semantic Bash: typed command tiles ───────── -->
              <template x-if="entry.type === 'semantic_bash'">
                <a :href="entry.comment_id ? '/graph/' + entry.comment_id : (entry.source_id ? '/graph/' + entry.source_id : (entry.bead_id ? '/bead/' + entry.bead_id : null))"
                   class="sc-tool-card block"
                   :class="(entry.comment_id || entry.source_id || entry.bead_id) ? 'cursor-pointer hover:bg-gray-800/80' : ''"
                   @click.prevent="if (entry.comment_id) navigateTo('/graph/' + entry.comment_id); else if (entry.source_id) navigateTo('/graph/' + entry.source_id); else if (entry.bead_id) navigateTo('/bead/' + entry.bead_id);">
                  <div class="sc-line1">
                    <span class="sc-chip" :class="{
                      'bg-purple-900 text-purple-300': entry.semantic_type === 'note-created',
                      'bg-blue-900 text-blue-300': entry.semantic_type === 'comment-added',
                      'bg-amber-900 text-amber-300': entry.semantic_type === 'thought-captured',
                      'bg-green-900 text-green-300': entry.semantic_type === 'dispatch-approved',
                      'bg-gray-700 text-gray-300': entry.semantic_type === 'state-changed',
                    }" x-text="{
                      'note-created': 'Note',
                      'comment-added': 'Comment',
                      'thought-captured': 'Thought',
                      'dispatch-approved': 'Dispatch',
                      'state-changed': 'State',
                    }[entry.semantic_type] || entry.semantic_type"></span>
                    <span class="sc-meta text-gray-400" x-text="entry.bead_id || entry.comment_id || entry.source_id || ''"></span>
                    <span class="sc-timestamp" x-text="formatTime(entry.timestamp)"></span>
                  </div>
                  <!-- Line 2: content (enriched title after lazy load, raw CLI output initially) -->
                  <div class="sc-line2 sc-line2-truncated" x-text="entry._enriched_title || entry.content"></div>

                  <!-- Line 3: enriched preview (appears after lazy load) -->
                  <template x-if="entry._enriched_preview">
                    <div class="text-xs mt-1 truncate" style="color:#6b7280" x-text="entry._enriched_preview"></div>
                  </template>

                  <!-- Line 4: enriched tags (appears after lazy load) -->
                  <template x-if="entry._enriched_tags && entry._enriched_tags.length > 0">
                    <div class="flex gap-1 flex-wrap mt-1">
                      <template x-for="t in entry._enriched_tags" :key="t">
                        <a :href="'/stream/' + t" @click.prevent.stop="navigateTo('/stream/' + t)"
                           style="display:inline-flex; padding:0 5px; border-radius:3px; font-size:9px; background:#1e293b; color:#94a3b8; text-decoration:none"
                           x-text="t"></a>
                      </template>
                    </div>
                  </template>

                  <!-- Lazy enhancement trigger -->
                  <template x-if="entry.source_id && !entry._enhanced">
                    <div x-intersect:enter.margin.100px="lazyEnhance(entry)" style="height:1px"></div>
                  </template>
                </a>
              </template>

        </div>
      </template>

    </div>
  </template>

  <!-- Resume auto-scroll button -->
  <button x-show="!autoScroll && entries.length > 0"
          @click="resumeScroll()"
          class="live-resume-btn" style="display:block;">
    Resume auto-scroll
  </button>
</div>

<!-- Screenshot injected indicator -->
<div x-show="screenshotInjected" x-transition
     class="px-2 py-1 bg-green-900/50 text-green-400 text-xs text-center flex-shrink-0">
  Screenshot injected into agent context
</div>

<!-- Input bar (shown when tmux session is known and session is live) -->
<template x-if="isLive && _tmuxSession">
  <div class="flex flex-col px-2 bg-gray-800 border-t border-gray-700 flex-shrink-0"
       style="padding-top:6px; padding-bottom:6px;"
       @dragenter.prevent="$el.classList.add('drop-highlight')"
       @dragover.prevent="$el.classList.add('drop-highlight')"
       @dragleave.prevent="$el.classList.remove('drop-highlight')"
       @drop.prevent="$el.classList.remove('drop-highlight'); addFiles($event.dataTransfer.files)">

    <!-- Attachment preview strip -->
    <div x-show="attachments.length > 0" class="flex" style="gap:6px; padding:2px 2px 4px; overflow:visible;">
      <template x-for="att in attachments" :key="att.id">
        <div class="thumb-wrap">
          <template x-if="att.isImage && att.dataUrl">
            <img :src="att.dataUrl">
          </template>
          <template x-if="!att.isImage || !att.dataUrl">
            <div class="thumb-file">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
              </svg>
              <span x-text="att.name"></span>
            </div>
          </template>
          <button class="thumb-x" @click="removeAttachment(att.id)">&times;</button>
        </div>
      </template>
    </div>

    <div class="flex gap-2 items-end">
      <!-- Hidden file input -->
      <input type="file"
             x-ref="cwFileInput"
             accept="image/*,*/*"
             multiple
             class="hidden"
             @change="addFiles($event.target.files); $event.target.value=''">

      <!-- Attach button (SVG paperclip) -->
      <button @click="$refs.cwFileInput.click()"
              :disabled="uploading"
              title="Attach file"
              class="flex-shrink-0 flex items-center justify-center
                     bg-transparent hover:bg-gray-700 text-gray-400 hover:text-gray-200
                     rounded-lg disabled:opacity-50 disabled:cursor-not-allowed
                     transition-colors duration-150"
              style="width:40px; height:40px;">
        <template x-if="!uploading">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </template>
        <template x-if="uploading">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="animate-spin"><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg>
        </template>
      </button>

      <!-- Message textarea -->
      <textarea x-model="inputText"
                x-ref="cwMessageInput"
                @keydown.ctrl.enter.prevent="sendMessage()"
                @keydown.meta.enter.prevent="sendMessage()"
                @input="$el.style.height='auto'; let c=Math.min($el.scrollHeight,160); $el.style.height=c+'px'; $el.style.overflowY=$el.scrollHeight>160?'auto':'hidden'"
                :placeholder="('ontouchstart' in window || window.innerWidth < 768) ? 'Message\u2026' : 'Message\u2026 (Ctrl+Enter to send)'"
                rows="1"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="sentences"
                enterkeyhint="send"
                class="flex-1 bg-gray-700 text-gray-100 px-3 py-2 rounded-lg text-base leading-normal
                       resize-none focus:outline-none border-2 border-transparent focus:border-indigo-500
                       font-sans transition-colors duration-150"
                style="min-height: 40px; max-height: 160px; overflow-y: hidden;"></textarea>

      <!-- Send button (SVG arrow + label) -->
      <button @click="sendMessage()"
              :disabled="(attachments.length === 0 && !inputText.trim()) || sending"
              class="flex-shrink-0 px-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-sm font-semibold
                     disabled:opacity-30 disabled:cursor-default
                     whitespace-nowrap flex items-center justify-center gap-1.5
                     transition-colors duration-150"
              style="height:40px;">
        <template x-if="!sending">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </template>
        <template x-if="sending">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="animate-spin"><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg>
        </template>
        <span x-text="sending ? 'Sending' : 'Send'"></span>
      </button>
    </div>
  </div>
</template>
