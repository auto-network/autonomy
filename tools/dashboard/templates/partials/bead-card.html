<a :href="'/bead/' + encodeURIComponent(b.id)"
   class="block px-4 py-3 bg-gray-800 rounded-lg mb-2 cursor-pointer">

  <!-- Row 1: stats plate — dot · bead-id · priority · state · [Live Trace] · duration -->
  <div class="flex items-center gap-2 min-w-0" style="font-size:10px; font-family:ui-monospace,monospace; color:#4b5e73">
    <span class="flex-shrink-0 w-2 h-2 rounded-full"
          :class="{
            'bg-green-400 animate-pulse': b._dotPulse,
            'bg-yellow-400': !b._dotPulse && b._dotColor === 'yellow',
            'bg-gray-500': b._dotColor === 'gray'
          }"></span>
    <span class="flex-shrink-0" x-text="b.id"></span>
    <span>·</span>
    {% include 'partials/priority-badge.html' %}
    {% include 'partials/state-badge.html' %}
    <template x-if="b._runDir">
      <button @click.prevent.stop="showLivePanel(b._runDir)"
              class="inline-flex items-center px-2 rounded text-xs ml-auto"
              style="height:18px; background:#312e81; color:#a5b4fc; white-space:nowrap;">
        Live Trace
      </button>
    </template>
    <template x-if="b._duration">
      <span :class="{ 'ml-auto': !b._runDir }" style="color:#94a3b8" x-text="b._duration"></span>
    </template>
  </div>

  <!-- Row 2: title — full width, 2-line clamp -->
  <div class="mt-1">
    <span class="text-sm font-semibold" style="color:#f1f5f9; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;" x-text="b.title"></span>
  </div>

  <!-- Row 3: snippet (active only) -->
  <template x-if="b._section === 'active'">
    <div class="mt-1.5 text-xs italic truncate" style="color:#6b7280" x-text="b._snippet || '\u00a0'"></div>
  </template>

  <!-- Blocked: blockers list -->
  <template x-if="b._section === 'blocked'">
    <div class="mt-1.5 flex items-center gap-1 flex-wrap">
      <span class="text-xs text-yellow-500">Blocked by:</span>
      <template x-for="bl in (b.blockers || [])" :key="bl.id">
        <a :href="'/bead/' + encodeURIComponent(bl.id)" @click.stop
           class="inline-flex items-center gap-1 px-2 py-0.5 bg-yellow-900/50 text-yellow-300 text-xs rounded hover:bg-yellow-800/60">
          <span class="font-mono" x-text="bl.id"></span>
          <span class="text-yellow-400/70" x-text="bl.title"></span>
        </a>
      </template>
    </div>
  </template>

  <!-- Active footer: thin divider + stats columns (label above value) -->
  <template x-if="b._section === 'active'">
    <div>
      <div class="my-2 h-px bg-gray-700"></div>
      <div class="flex items-start gap-4 text-xs font-mono" style="color:#6b7280">
        <template x-if="b._cpu_pct">
          <div class="flex flex-col">
            <span style="font-size:9px; color:#475569; text-transform:uppercase">cpu</span>
            <span style="color:#94a3b8" x-text="b._cpu_pct"></span>
          </div>
        </template>
        <template x-if="b._mem_mb">
          <div class="flex flex-col">
            <span style="font-size:9px; color:#475569; text-transform:uppercase">mem</span>
            <span style="color:#94a3b8" x-text="b._mem_mb"></span>
          </div>
        </template>
        <template x-if="b._tok">
          <div class="flex flex-col">
            <span style="font-size:9px; color:#475569; text-transform:uppercase">tok</span>
            <span style="color:#94a3b8" x-text="b._tok"></span>
          </div>
        </template>
        <template x-if="b._tools">
          <div class="flex flex-col">
            <span style="font-size:9px; color:#475569; text-transform:uppercase">tools</span>
            <span style="color:#94a3b8" x-text="b._tools"></span>
          </div>
        </template>
        <template x-if="b._turns">
          <div class="flex flex-col">
            <span style="font-size:9px; color:#475569; text-transform:uppercase">turns</span>
            <span style="color:#94a3b8" x-text="b._turns"></span>
          </div>
        </template>
        <template x-if="b._last">
          <div class="flex flex-col ml-auto">
            <span style="font-size:9px; color:#475569; text-transform:uppercase">last</span>
            <span style="color:#94a3b8" x-text="b._last"></span>
          </div>
        </template>
      </div>
    </div>
  </template>

  <!-- Non-active footer: just priority badge (already on stats plate, but kept for waiting/blocked cards without stats plate badges rendering) -->

</a>
